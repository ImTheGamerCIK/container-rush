<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Container Rush</title>
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React pour l'interface -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel pour lire le code JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { touch-action: manipulation; overscroll-behavior: none; }
        @keyframes bounce-slight { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        .animate-bounce-slight { animation: bounce-slight 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 overflow-x-hidden text-slate-200 font-mono select-none">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const { useState, useEffect } = React;

        // --- INITIALISATION FIREBASE ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'container-rush-dev';
        
        // ⚠️ REMPLACEZ LA LIGNE CI-DESSOUS PAR VOTRE CODE FIREBASE AVANT DE DÉPLOYER ⚠️
        const firebaseConfig = {
  apiKey: "AIzaSyBkI615UzSjgiC8Kfih3Jh1p7DrOjisldg",
  authDomain: "container-rush.firebaseapp.com",
  projectId: "container-rush",
  storageBucket: "container-rush.firebasestorage.app",
  messagingSenderId: "792149875715",
  appId: "1:792149875715:web:6355d830c20a89f9a98236",
  measurementId: "G-5JM0CGG78B"
}; 
        
        let app, auth, db;
        try {
            if (firebaseConfig) {
                app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (e) {
            console.error("Erreur Init Firebase:", e);
        }

        // --- CONFIGURATION ET DONNÉES DU JEU (CHARTE PREMIUM) ---
        const BLOCK_TYPES = {
          L:   { id: 'L',   label: 'L',   name: 'Léger',    style: { backgroundColor: '#f8fafc', color: '#0f172a', borderColor: '#cbd5e1' }, points: 1 },
          M:   { id: 'M',   label: 'M',   name: 'Moyen',    style: { backgroundColor: '#94a3b8', color: '#0f172a', borderColor: '#475569' }, points: 2 },
          H:   { id: 'H',   label: 'H',   name: 'Lourd',    style: { backgroundColor: '#1e293b', color: '#f8fafc', borderColor: '#000000' }, points: 1 },
          R:   { id: 'R',   label: 'R',   name: 'Reefer',   style: { backgroundColor: '#06b6d4', color: '#0f172a', borderColor: '#164e63' }, points: 3 },
          HAZ: { id: 'HAZ', label: 'HAZ', name: 'Hazard',   style: { background: 'repeating-linear-gradient(45deg, #f97316, #f97316 6px, #1e293b 6px, #1e293b 12px)', color: 'white', borderColor: '#f97316' }, points: 4 },
          TW:  { id: 'TW',  label: 'TW',  name: 'Twin',     style: { backgroundColor: '#22c55e', color: 'white', borderColor: '#14532d' }, points: 5 },
        };

        const BAYS_DATABASE = [
          { name: "B01: Standard", layout: [['L','L','L','L'], ['M','M','M'], ['H','M','H'], ['H','H']] },
          { name: "B02: Frigo Cale", layout: [['L','L','L','L'], ['M','R','M'], ['H','R','H'], ['H','H']] },
          { name: "B03: Noyau Toxique", layout: [['L','L','L','L'], ['M','M','M'], ['H','HAZ','H'], ['H','TW']] },
          { name: "B04: Base Lourde", layout: [['L','M','M','L'], ['M','M','M'], ['H','H','H'], ['H','H']] },
          { name: "B05: Cale Mixte", layout: [['L','M','M','L'], ['M','HAZ','M'], ['H','R','H'], ['H','TW']] }
        ];

        const DECKS_DATABASE = [
          { name: "D01: Pyramide", layout: [[null, null, 'L', null, null], [null, 'M', 'M', 'M', null], ['H', 'R', 'M', 'R', 'H'], ['H', 'H', 'TW', 'H', 'H']] },
          { name: "D02: Deux Tours", layout: [['L', null, null, null, 'L'], ['M', null, 'M', null, 'M'], ['M', 'M', 'HAZ', 'M', 'M'], ['H', 'H', 'TW', 'H', 'H']] },
          { name: "D03: Plateau Plat", layout: [[null, 'L', 'L', 'L', null], [null, 'M', 'M', 'M', null], ['M', 'R', 'M', 'R', 'M'], ['H', 'H', 'H', 'H', 'H']] },
          { name: "D04: Le Bastion", layout: [[null, null, null, null, null], [null, 'L', 'L', 'L', null], ['M', 'R', 'H', 'R', 'M'], ['H', 'H', 'TW', 'H', 'H']] },
          { name: "D05: Bloc HAZ", layout: [[null, null, 'L', null, null], [null, 'L', 'HAZ', 'L', null], ['M', 'M', 'M', 'M', 'M'], ['H', 'H', 'TW', 'H', 'H']] }
        ];

        const enrichLayout = (layout) => {
          let currentIndex = 0;
          const enriched = layout.map(row => row.map(() => null));
          for (let r = layout.length - 1; r >= 0; r--) {
            for (let c = 0; c < layout[r].length; c++) {
              if (layout[r][c] !== null) {
                enriched[r][c] = { type: layout[r][c], linearIndex: currentIndex };
                currentIndex++;
              }
            }
          }
          return { enriched, total: currentIndex };
        };

        const generateInitialCour = () => {
          const pool = [
            ...Array(24).fill('L'), ...Array(36).fill('M'), ...Array(36).fill('H'),
            ...Array(12).fill('R'), ...Array(6).fill('HAZ'), ...Array(6).fill('TW'),
          ];
          for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
          }
          const cour = [];
          let index = 0;
          for (let p = 0; p < 10; p++) {
            const pile = [];
            for (let c = 0; c < 4; c++) {
              const col = [];
              for (let b = 0; b < 3; b++) { col.push(pool[index]); index++; }
              pile.push(col);
            }
            cour.push(pile);
          }
          return cour;
        };

        const getRandomCranes = () => {
          const shuffledBays = [...BAYS_DATABASE].sort(() => 0.5 - Math.random());
          const shuffledDecks = [...DECKS_DATABASE].sort(() => 0.5 - Math.random());
          const cranes = [];
          for (let i = 0; i < 3; i++) {
              cranes.push({
                  id: i + 1,
                  name: `GRUE ${i + 1}`,
                  bayName: shuffledBays[i].name,
                  deckName: shuffledDecks[i].name,
                  bayData: enrichLayout(shuffledBays[i].layout),
                  deckData: enrichLayout(shuffledDecks[i].layout),
                  phase: 'bay',
                  progress: 0,
              });
          }
          return cranes;
        };

        const generateRoomCode = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for(let i=0; i<5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        };

        // --- LE SCRIPT DU TUTORIEL GUIDÉ ---
        const TUTORIAL_STEPS = [
            { type: 'info', title: 'Le But du Jeu', text: 'Bienvenue sur le terminal ! Le but du jeu est d\'accumuler le maximum de Points de Fret (PF) en chargeant le navire selon des plans stricts.' },
            { type: 'info', title: 'Les Points de Fret', text: 'Chaque conteneur rapporte des points différents : Lourd=1 PF, Moyen=2 PF, jusqu\'au Twin=5 PF ! La Grue 1 (B01) demande 2 Lourds (Noirs) pour commencer. Suivez le halo vert !' },
            
            // TOUR 1
            { type: 'action', target: 'FLEET_S0', actionType: 'select_machine', args: ['S', 0], text: 'TOUR 1. Vous disposez de 4 Points Grue (PG) par tour. Ces PG représentent votre énergie d\'action ! Sélectionnez votre Stacker (S1) bleu dans la flotte en haut.' },
            { type: 'action', target: 'NAV_1', actionType: 'move_machine', args: [1], text: 'Les machines sont essentielles : sans elles au parking d\'une pile, impossible d\'interagir ! Garez le Stacker sur la Pile 2 dans le Navigateur central (-1 PG).' },
            { type: 'action', target: 'DETAIL_COL_0', targetPile: 1, actionType: 'select_block', args: [0], text: 'Le Stacker (S) ne prend QUE le conteneur à l\'avant. Cliquez sur le conteneur Lourd (Noir) dans la vue détaillée.' },
            { type: 'action', target: 'CRANE_0', actionType: 'click_crane', args: [0], text: 'Pour envoyer ce conteneur au navire, cliquez sur la Grue 1. Cela valide le chargement et démarre la fondation (-1 PG) !' },
            
            { type: 'action', target: 'FLEET_T', actionType: 'select_machine', args: ['T', 'T'], text: 'Il vous reste 2 PG. Sélectionnez le grand Transtainer (T) jaune.' },
            { type: 'action', target: 'NAV_3', actionType: 'move_machine', args: [3], text: 'Le Transtainer est puissant, mais chaque déplacement coûte de précieux PG qui auraient pu servir à envoyer des conteneurs ! Déplacez-le sur la Pile 4 (-1 PG).' },
            { type: 'action', target: 'DETAIL_COL_2', targetPile: 3, actionType: 'select_block', args: [2], text: 'Contrairement au Stacker, le Transtainer peut plonger pour prendre n\'importe quel conteneur au sommet. Prenez le conteneur Lourd (Noir) de la 3ème colonne.' },
            { type: 'action', target: 'CRANE_0', actionType: 'click_crane', args: [0], text: 'Envoyez-le sur la Grue 1 (-1 PG). La fondation A est prête !' },
            { type: 'action', target: 'PASS_BTN', actionType: 'pass_turn', args: [], text: 'Vos 4 PG sont épuisés. Cliquez sur PASSER (bouton rouge).' },
            
            // TOUR IA
            { type: 'ai_turn', title: 'Tour de l\'IA', text: 'Tour de l\'IA : L\'IA déplace le Transtainer sur la Pile 2. Attention : Le Transtainer impose une Zone de Sécurité sur sa pile et les deux voisines. Votre Stacker s\'y trouvait : il est expulsé en Zone Spelo pour sa sécurité !', execute: (draft) => { draft.transtainer = 1; draft.stackers[0] = null; draft.message="La Zone de Sécurité vous expulse en Spelo !"; draft.ap = 4; } },
            
            // TOUR 2
            { type: 'action', target: 'FLEET_S0', actionType: 'select_machine', args: ['S', 0], text: 'TOUR 2 (4 PG). Votre Stacker est en Spelo. Sélectionnez-le.' },
            { type: 'action', target: 'NAV_4', actionType: 'move_machine', args: [4], text: 'SORTIR du Spelo coûte 0 PG ! Garez-vous sur la Pile 5.' },
            { type: 'action', target: 'DETAIL_COL_0', targetPile: 4, actionType: 'select_block', args: [0], text: 'Le niveau B demande un Lourd (Noir), bloqué par un Léger (Blanc) à l\'avant. Prenez le Blanc.' },
            { type: 'action', target: 'NAV_5', actionType: 'shift_nav', args: [5], text: 'SHIFTAGE STACKER : Un Stacker shifte uniquement vers une pile voisine ! Cliquez sur la Pile 6 pour y jeter le Blanc (-1 PG). Vous pouvez aussi utiliser ce coup pour bloquer un joueur !' },
            { type: 'action', target: 'DETAIL_COL_0', targetPile: 4, actionType: 'select_block', args: [0], text: 'Le conteneur Lourd (Noir) est dégagé ! Prenez-le.' },
            { type: 'action', target: 'CRANE_0', actionType: 'click_crane', args: [0], text: 'Envoyez-le sur la Grue 1 (-1 PG).' },
            
            { type: 'action', target: 'NAV_1', actionType: 'navigate', args: [1], text: 'Il vous reste 2 PG. Cliquez sur la Pile 2 dans le Navigateur pour y observer le Transtainer.' },
            { type: 'action', target: 'PARKING_T', targetPile: 1, actionType: 'select_machine', args: ['T', 'T'], text: 'Sélectionnez le Transtainer en cliquant sur son jeton directement garé dans le parking en bas !' },
            { type: 'action', target: 'DETAIL_COL_2', targetPile: 1, actionType: 'select_block', args: [2], text: 'La Grue 1 veut ensuite un Moyen (Gris), bloqué par un Léger (Blanc). Prenez le Blanc.' },
            { type: 'action', target: 'DETAIL_SHIFT_3', targetPile: 1, actionType: 'shift_detail', args: [3], text: 'SHIFTAGE TRANSTAINER : Le T shifte dans sa PROPRE pile. Cliquez sur la flèche ⬇️ de la colonne vide à côté (-1 PG).' },
            { type: 'action', target: 'DETAIL_COL_2', targetPile: 1, actionType: 'select_block', args: [2], text: 'Prenez le conteneur Moyen (Gris) maintenant accessible.' },
            { type: 'action', target: 'CRANE_0', actionType: 'click_crane', args: [0], text: 'Envoyez-le sur la Grue 1 (-1 PG). La structure monte !' },
            { type: 'action', target: 'PASS_BTN', actionType: 'pass_turn', args: [], text: 'Tour terminé, cliquez sur PASSER.' },
            
            { type: 'info', title: 'Tutoriel Terminé !', text: 'Vous maîtrisez la légalité des poses, la sélection via le parking, le shiftage, et la Zone de Sécurité. Le port vous appartient !', action: 'end' }
        ];

        // --- COMPOSANTS DE RENDU PREMIUM ---
        
        // 1. La Tuile Conteneur (Volume 3D, Verrouillage Cube)
        const BlockTile = ({ blockId, isSelected, isAccessible, status, isMini }) => {
          if (!blockId) return <div className="w-full h-full"></div>;
          const b = BLOCK_TYPES[blockId];
          
          let classes = "w-full h-full rounded-[2px] md:rounded-[3px] border flex items-center justify-center font-black relative transition-all duration-200 shrink-0 ";
          
          let inlineStyle = { 
              ...b.style, 
              boxShadow: 'inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.3)' 
          };
          
          let textClass = isMini 
              ? 'text-[7px] md:text-[9px]' 
              : ((b.label === 'HAZ' || b.label === 'TW') ? 'text-[clamp(6px,2vmin,14px)] tracking-tighter' : 'text-[clamp(8px,2.5vmin,16px)]');

          if (isSelected) { 
              classes += " ring-[2px] ring-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.8)] z-20 scale-110 "; 
          } else if (isAccessible && status === 'normal') { 
              classes += " ring-[2px] ring-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.6)] z-10 hover:scale-105 cursor-pointer "; 
          } 
          
          if (status === 'done') { 
              classes += " opacity-40 scale-[0.9] border-dashed "; 
          } else if (status === 'current') { 
              classes += " ring-[2px] ring-yellow-400 ring-offset-[1px] ring-offset-slate-900 animate-pulse z-10 scale-110 shadow-lg "; 
          } else if (status === 'upcoming') { 
              classes += " opacity-90 "; 
          }

          return (
            <div className={classes} style={inlineStyle} title={b.name}>
              {status === 'done' 
                  ? <span className="text-white text-[9px] md:text-[12px] drop-shadow-md">✓</span> 
                  : <span className={`${textClass} leading-none drop-shadow-md`}>{b.label}</span>}
            </div>
          );
        };

        // 2. La Mini-Carte (Flexbox dynamique anti-écrasement)
        const MiniMap = ({ layoutData, progress, type, isActive, name }) => {
          const isBay = type === 'bay';
          
          const bgStyle = isBay 
            ? { backgroundColor: '#0f172a', backgroundImage: 'radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.8) 100%)' }
            : { backgroundColor: '#1e3a8a', backgroundImage: 'linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px)', backgroundSize: '10px 10px' };
          
          const borderColor = isBay ? 'border-slate-600' : 'border-blue-400';
          const headerBg = isBay ? 'bg-slate-800' : 'bg-slate-900/80';
          const titleColor = isBay ? 'text-slate-300' : 'text-blue-100';
          const opacity = isActive ? 'opacity-100' : 'opacity-60 saturate-50';

          return (
            <div className={`flex flex-col border-2 ${borderColor} rounded-lg overflow-hidden w-full h-full shadow-lg ${opacity} transition-all duration-500`} style={bgStyle}>
              
              <div className={`${headerBg} border-b ${borderColor} px-2 py-0.5 flex justify-between items-center z-10 shrink-0`}>
                <span className={`text-[8px] md:text-[10px] font-bold uppercase tracking-widest ${titleColor}`}>{name}</span>
                {isActive && <span className="flex h-1.5 w-1.5 relative"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span></span>}
              </div>
              
              {/* Flexbox avec hauteur fixée (23%) pour forcer le ratio carré de l'enfant (aspect-square) */}
              <div className="flex-1 min-h-0 flex flex-col items-center justify-end p-1 md:p-1.5 gap-[1px] md:gap-[2px] relative z-10 w-full pb-1.5">
                  {layoutData.enriched.map((row, rIdx) => (
                    <div key={rIdx} className="flex justify-center items-center gap-[1px] md:gap-[2px] w-full min-h-0" style={{ height: '23%' }}>
                      {row.map((cell, cIdx) => {
                        if (!cell) {
                          return <div key={`${rIdx}-${cIdx}`} className="h-full aspect-square border border-dashed border-white/20 rounded-[2px] bg-white/5 shrink-0"></div>;
                        }
                        
                        const isDone = isActive ? cell.linearIndex < progress : (isBay ? true : false);
                        const isCurrent = isActive && cell.linearIndex === progress;
                        
                        return (
                          <div key={`${rIdx}-${cIdx}`} className="h-full aspect-square shrink-0 relative">
                             <BlockTile blockId={cell.type} status={isDone ? 'done' : isCurrent ? 'current' : 'upcoming'} isMini={true} />
                          </div>
                        );
                      })}
                    </div>
                  ))}
              </div>
            </div>
          );
        };

        // --- APPLICATION PRINCIPALE ---
        function App() {
          const [G, setG] = useState(null); 
          const [user, setUser] = useState(null);
          const [isAuthLoading, setIsAuthLoading] = useState(true); 
          
          const [lobbyMode, setLobbyMode] = useState('menu'); 
          const [roomId, setRoomId] = useState(null);
          const [joinCodeInput, setJoinCodeInput] = useState('');
          
          const [mySeat, setMySeat] = useState(0); 
          const [selected, setSelected] = useState(null);
          const [localMsg, setLocalMsg] = useState("");
          const [activePileIdx, setActivePileIdx] = useState(0);

          // Modales
          const [showRules, setShowRules] = useState(false);
          const [showDevlog, setShowDevlog] = useState(false);
          const [showNewGameConfirm, setShowNewGameConfirm] = useState(false);
          const [showMenuConfirm, setShowMenuConfirm] = useState(false);

          // Tutoriel Actif & Snapshots
          const [tutorialState, setTutorialState] = useState(null); 
          const [tutorialSnapshots, setTutorialSnapshots] = useState({});

          const [isAIEnabled, setIsAIEnabled] = useState(false);
          const [aiDifficulty, setAiDifficulty] = useState('moyen');

          useEffect(() => {
            if (!auth) { setIsAuthLoading(false); return; }
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } 
                    else { await signInAnonymously(auth); }
                } catch(e) { setIsAuthLoading(false); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => { setUser(currentUser); setIsAuthLoading(false); });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
              if (!user || !roomId || !db || tutorialState) return; 
              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
              const unsubscribe = onSnapshot(docRef, (snap) => {
                  if (snap.exists()) {
                      const data = snap.data();
                      if (data.payload) setG(JSON.parse(data.payload));
                      else setG(data); 
                  } else {
                      setLocalMsg("La salle a été fermée.");
                      setRoomId(null); setLobbyMode('menu');
                  }
              });
              return () => unsubscribe();
          }, [user, roomId, tutorialState]);

          // --- SAUVEGARDE DU TUTORIEL (SNAPSHOTS) ---
          useEffect(() => {
              if (tutorialState && tutorialState.active && G) {
                  setTutorialSnapshots(prev => {
                      if (!prev[tutorialState.step]) {
                          return { 
                              ...prev, 
                              [tutorialState.step]: { 
                                  G: JSON.parse(JSON.stringify(G)), 
                                  activePileIdx, 
                                  selected: selected ? JSON.parse(JSON.stringify(selected)) : null 
                              } 
                          };
                      }
                      return prev;
                  });
              }
          }, [tutorialState?.step, G, activePileIdx, selected]);

          // --- MOTEUR DU TUTORIEL ---
          const startInteractiveTutorial = () => {
              const tutState = createInitialState();
              tutState.ap = 4;
              tutState.message = "🎓 TUTORIEL : Suivez le halo vert !";
              
              tutState.cranes[0].bayData = enrichLayout(BAYS_DATABASE[0].layout); 
              tutState.cranes[0].deckData = enrichLayout(DECKS_DATABASE[0].layout);
              tutState.cranes[0].name = "GRUE 1";
              tutState.cranes[0].phase = 'bay';
              tutState.cranes[0].progress = 0;

              tutState.cour = generateInitialCour(); 
              
              tutState.cour[1][0] = ['M', 'L', 'H']; 
              tutState.cour[3][2] = ['M', 'L', 'H']; 
              tutState.cour[4][0] = ['M', 'H', 'L']; 
              tutState.cour[5][0] = ['M', 'L'];      
              tutState.cour[1][2] = ['H', 'M', 'L']; 
              tutState.cour[1][3] = ['H', 'M'];      
              
              tutState.stackers[0] = 0; 
              tutState.stackers[1] = 9; 
              tutState.transtainer = 4; 
              
              setTutorialSnapshots({}); 
              setG(tutState);
              setRoomId(null);
              setMySeat(0);
              setActivePileIdx(0); 
              setIsAIEnabled(false);
              setTutorialState({ step: 0, active: true, minimized: false }); 
              setLobbyMode('game');
          };

          const processTutorialAction = (actionType, args) => {
              if (!tutorialState || !tutorialState.active) return true; 
              const stepData = TUTORIAL_STEPS[tutorialState.step];
              if (stepData.type !== 'action') return false; 
              
              if (stepData.actionType === actionType) {
                  let match = true;
                  for(let i=0; i<args.length; i++) {
                      if (args[i] !== stepData.args[i]) match = false;
                  }
                  if (match) {
                      setTimeout(() => setTutorialState(prev => ({...prev, step: prev.step + 1})), 100);
                      return true;
                  }
              }
              setLocalMsg("❌ Action incorrecte. Suivez le halo vert (ou utilisez Recommencer l'étape).");
              setTimeout(() => setLocalMsg(""), 2500);
              return false;
          };

          const resetTutorialSelection = () => {
              if (tutorialState && tutorialSnapshots[tutorialState.step]) {

          const mutateG = async (mutatorFn) => {

          const isMyTurn = (G?.currentPlayer === mySeat) || tutorialState !== null;
          const canInteract = G?.gameStatus === 'playing' && (!roomId || isMyTurn);

          const getFirstAvailCol = (pile) => { for(let c=0; c<4; c++) if(pile[c].length > 0) return c; return -1; };
          const getFirstNonFullCol = (pile) => { for(let c=0; c<4; c++) if(pile[c].length < 3) return c; return -1; };
          const getCurrentRequirement = (crane) => {
            if (crane.phase === 'done') return null;
            const data = crane.phase === 'bay' ? crane.bayData : crane.deckData;
            for (let r = 0; r < data.enriched.length; r++) {
              for (let c = 0; c < data.enriched[r].length; c++) {
                const cell = data.enriched[r][c];

          // --- IA ---
          const executeAITurn = () => {
            if (!G || tutorialState) return;
            let requirements = []; G.cranes.forEach((crane, idx) => { if (crane.phase !== 'done') requirements.push({ blockId: getCurrentRequirement(crane), craneIdx: idx }); });
            let candidates = [];

                        let matchingTarget = requirements.find(req => req.blockId === topBlock);
                        if (matchingTarget) {
                            if (getFirstAvailCol(G.cour[p]) === c) {
                                let isBlocked = Math.abs(p - G.transtainer) <= 1;
                                let moveCost = (G.stackers[1] === p) ? 0 : (G.stackers[1] === null ? 0 : 1);
                                if (!isBlocked && (moveCost + 1 <= G.ap)) candidates.push({ type: 'POSE', machine: 'S', pIdx: p, cIdx: c, moveCost: moveCost, target: matchingTarget });
                            }
                            let tMoveCost = Math.abs(G.transtainer - p);
                            if (tMoveCost + 1 <= G.ap) candidates.push({ type: 'POSE', machine: 'T', pIdx: p, cIdx: c, moveCost: tMoveCost, target: matchingTarget });
                        }

                else if (aiDifficulty === 'difficile') candidates.sort((a, b) => { let aBump = (a.machine === 'S' && G.stackers[0] === a.pIdx) || (a.machine === 'T' && G.stackers[0] !== null && Math.abs(G.stackers[0] - a.pIdx) <= 1) ? 1 : 0; let bBump = (b.machine === 'S' && G.stackers[0] === b.pIdx) || (b.machine === 'T' && G.stackers[0] !== null && Math.abs(G.stackers[0] - b.pIdx) <= 1) ? 1 : 0; if (aBump !== bBump) return bBump - aBump; return a.moveCost - b.moveCost; });
                else candidates.sort((a, b) => a.moveCost - b.moveCost);
                applyAIPose(candidates[0]); return;
            }
            let shiftCandidates = [];
            for (let p = 0; p < 10; p++) {
                for (let c = 0; c < 4; c++) {
                    if (G.cour[p][c].length > 1) {
                        let buriedBlock = G.cour[p][c][G.cour[p][c].length - 2];
                        let matchingTarget = requirements.find(req => req.blockId === buriedBlock);
                        if (matchingTarget) {
                            if (getFirstAvailCol(G.cour[p]) === c && Math.abs(p - G.transtainer) > 1) {
                                let moveCost = (G.stackers[1] === p) ? 0 : (G.stackers[1] === null ? 0 : 1);
                                let adjPiles = []; if (p > 0 && getFirstNonFullCol(G.cour[p-1]) !== -1) adjPiles.push(p-1); if (p < 9 && getFirstNonFullCol(G.cour[p+1]) !== -1) adjPiles.push(p+1);
                                if (adjPiles.length > 0 && (moveCost + 1 <= G.ap)) shiftCandidates.push({ type: 'SHIFT', machine: 'S', pIdx: p, cIdx: c, targetPIdx: adjPiles[0], moveCost: moveCost });
                            }
                            let tMoveCost = Math.abs(G.transtainer - p); let targetCIdx = -1;
                            for(let tc=0; tc<4; tc++) { if (tc !== c && G.cour[p][tc].length < 3) targetCIdx = tc; }
                            if (targetCIdx !== -1 && (tMoveCost + 1 <= G.ap)) shiftCandidates.push({ type: 'SHIFT', machine: 'T', pIdx: p, cIdx: c, targetCIdx: targetCIdx, moveCost: tMoveCost });
                        }
                    }
                }
            }
            if (shiftCandidates.length > 0) {
                if (aiDifficulty === 'facile' && Math.random() > 0.5) { applyAIShift(shiftCandidates[Math.floor(Math.random() * shiftCandidates.length)]); return; }
                else if (aiDifficulty !== 'facile') { shiftCandidates.sort((a, b) => a.moveCost - b.moveCost); applyAIShift(shiftCandidates[0]); return; }
            }
            if (aiDifficulty === 'difficile' && G.ap >= 1 && G.stackers[0] !== null) { let tMoveCost = Math.abs(G.transtainer - G.stackers[0]); if (tMoveCost > 0 && tMoveCost <= G.ap) { applyAITMoveOnly(G.stackers[0], tMoveCost); return; } }
            if (aiDifficulty !== 'facile' && G.ap >= 2 && G.stackers[1] !== null) applyAISpelo();
            else mutateG(draft => { draft.ap = 0; });
          };
          useEffect(() => { if (G && isAIEnabled && G.currentPlayer === 1 && G.gameStatus === 'playing') { const timer = setTimeout(() => { if (G.ap > 0) executeAITurn(); else endTurn(); }, 1200); return () => clearTimeout(timer); } }, [G, isAIEnabled, aiDifficulty]);

          const applyAIPose = (move) => {
              mutateG(draft => {
                  const blockId = draft.cour[move.pIdx][move.cIdx].pop(); let pointsEarned = BLOCK_TYPES[blockId].points;
                  const activeCrane = draft.cranes[move.target.craneIdx]; activeCrane.progress += 1;
                  let msg = ""; const currentTotal = activeCrane.phase === 'bay' ? activeCrane.bayData.total : activeCrane.deckData.total; let isGameOver = false;
                  if (activeCrane.progress === currentTotal) { if (activeCrane.phase === 'bay') { activeCrane.phase = 'deck'; activeCrane.progress = 0; pointsEarned += 5; msg = `🤖 L'IA a scellé la Baie ${move.target.craneIdx + 1}!`; } else { activeCrane.phase = 'done'; pointsEarned += 10; msg = `🤖 L'IA a terminé le Deck ${move.target.craneIdx + 1}!`; if (draft.cranes.filter(c => c.phase === 'done').length >= 2) isGameOver = true; } } 
                  else { msg = `🤖 L'IA a posé un conteneur [${BLOCK_TYPES[blockId].name}].`; }
                  draft.players[1].score += pointsEarned;
                  if (move.machine === 'S') { draft.stackers[1] = move.pIdx; if (draft.stackers[0] === move.pIdx) { draft.stackers[0] = null; msg += " Vous êtes expulsé !"; } } else { draft.transtainer = move.pIdx; if (draft.stackers[0] !== null && Math.abs(draft.stackers[0] - move.pIdx) <= 1) { draft.stackers[0] = null; msg += " La Zone de Sécurité vous expulse !"; } if (draft.stackers[1] !== null && Math.abs(draft.stackers[1] - move.pIdx) <= 1) { draft.stackers[1] = null; } }
                  draft.ap -= (move.moveCost + 1); draft.message = msg;
                  if (isGameOver) { draft.gameStatus = 'gameover'; const winner = draft.players[0].score > draft.players[1].score ? "Vous avez gagné" : "L'IA gagne"; draft.message = `🚨 FIN DE PARTIE ! ${winner} !`; }
              });
          };
          const applyAIShift = (move) => { mutateG(draft => { const blockId = draft.cour[move.pIdx][move.cIdx].pop(); let msg = ""; if (move.machine === 'S') { draft.stackers[1] = move.pIdx; if (draft.stackers[0] === move.pIdx) { draft.stackers[0] = null; } const targetCol = getFirstNonFullCol(draft.cour[move.targetPIdx]); draft.cour[move.targetPIdx][targetCol].push(blockId); msg = `🤖 L'IA a shifté P${move.pIdx+1}.`; } else { draft.transtainer = move.pIdx; if (draft.stackers[0] !== null && Math.abs(draft.stackers[0] - move.pIdx) <= 1) { draft.stackers[0] = null; } if (draft.stackers[1] !== null && Math.abs(draft.stackers[1] - move.pIdx) <= 1) { draft.stackers[1] = null; } draft.cour[move.pIdx][move.targetCIdx].push(blockId); msg = `🤖 L'IA creuse la P${move.pIdx+1}.`; } draft.ap -= (move.moveCost + 1); draft.message = msg; }); };
          const applyAISpelo = () => { mutateG(draft => { draft.stackers[1] = null; draft.ap = 0; draft.message = `🤖 L'IA se retire en Spelo.`; }); };
          const applyAITMoveOnly = (pIdx, cost) => { mutateG(draft => { draft.transtainer = pIdx; draft.ap -= cost; draft.stackers[0] = null; if (draft.stackers[1] !== null && Math.abs(draft.stackers[1] - pIdx) <= 1) { draft.stackers[1] = null; } draft.message = `🤖 SABOTAGE ! L'IA vous bloque !`; }); };

          // --- GESTION DES CLICS ---
          const handleMachineSelect = (type, id) => {
            if (!canInteract) { setLocalMsg(roomId ? "Attendez votre tour !" : ""); return; }
            if (selected && selected.type === 'machine' && selected.id === id) { setSelected(null); setLocalMsg("Sélection annulée."); return; }

            mutateG(draft => { draft.message = type === 'T' ? "🟡 TRANSTAINER : Cliquez sur une Pile du Navigateur pour le déplacer." : "🔵 STACKER : Cliquez sur une Pile du Navigateur pour le déplacer."; });
          };

          const handlePileNavigatorClick = (pIdx) => {
              if (!canInteract) { setActivePileIdx(pIdx); return; }
              
              if (tutorialState && tutorialState.active) {
                  const stepData = TUTORIAL_STEPS[tutorialState.step];

                          setActivePileIdx(pIdx);

              if (selected?.type === 'machine') { handleMachineMove(pIdx); setActivePileIdx(pIdx); return; }
              
              if (selected?.type === 'block' && selected.machine === 'S') {

              }
              
              if (selected?.type === 'block' && selected.machine === 'T') {

              setActivePileIdx(pIdx);

          const handleMachineMove = (targetPileIdx) => {
              if (!processTutorialAction('move_machine', [targetPileIdx])) return;

              if (selected.id === 'T') {
                  const dist = Math.abs(targetPileIdx - G.transtainer);

                  if (G.ap < dist) { setLocalMsg("⚠️ PG Insuffisants pour déplacer le Transtainer."); return; }
                  mutateG(draft => { draft.ap -= dist; draft.transtainer = targetPileIdx; let bumped = false; if (draft.stackers[0] !== null && Math.abs(draft.stackers[0] - targetPileIdx) <= 1) { draft.stackers[0] = null; bumped = true; } if (draft.stackers[1] !== null && Math.abs(draft.stackers[1] - targetPileIdx) <= 1) { draft.stackers[1] = null; bumped = true; } draft.message = `🟡 Transtainer déplacé en P${targetPileIdx+1} (-${dist} PG). ${bumped ? 'Expulsion Spelo!' : ''}`; });
                  setSelected(null); setLocalMsg("");
              } else {
                  const targetStacker = tutorialState ? 0 : G.currentPlayer;
                  if (G.stackers[targetStacker] === targetPileIdx) { setSelected(null); return; }
                  if (Math.abs(targetPileIdx - G.transtainer) <= 1) { setLocalMsg("❌ Bloqué par la Zone de Sécurité du Transtainer."); return; }
                  const cost = G.stackers[targetStacker] === null ? 0 : 1;
                  if (G.ap < cost) { setLocalMsg("⚠️ PG Insuffisants."); return; }
                  mutateG(draft => { draft.ap -= cost; draft.stackers[targetStacker] = targetPileIdx; const enemy = targetStacker === 0 ? 1 : 0; let bumped = false; if (draft.stackers[enemy] === targetPileIdx) { draft.stackers[enemy] = null; bumped = true; } draft.message = `🔵 Stacker garé sur P${targetPileIdx+1} (-${cost} PG). ${bumped ? 'Expulsion!' : ''}`; });
                  setSelected(null); setLocalMsg("");

          const handleColClickDetail = (colIdx) => {
              if (!canInteract) return;

              if (selected && selected.type === 'block') {

              if (!processTutorialAction('select_block', [colIdx])) return;

              const pile = G.cour[pIdx]; if (pile[colIdx].length === 0) return;
              const targetStacker = tutorialState ? 0 : G.currentPlayer;

              if (hasT) { 
                  setSelected({ type: 'block', machine: 'T', pile: pIdx, col: colIdx }); setLocalMsg(""); 
                  mutateG(draft => { draft.message = "🟡 Conteneur sélectionné (T). Cliquez sur Plan ou case vide pour Shifter."; }); return; 
              }
              if (hasS) { 
                  const firstCol = getFirstAvailCol(pile); 
                  if (colIdx !== firstCol) { setLocalMsg("❌ Stacker : Extrait uniquement à l'avant."); return; } 
                  setSelected({ type: 'block', machine: 'S', pile: pIdx, col: colIdx }); setLocalMsg(""); 
                  mutateG(draft => { draft.message = "🔵 Conteneur sélectionné (S). Cliquez sur Plan ou pile voisine pour Shifter."; }); 
              }
          };

          const handleShiftDestination = (targetPileIdx, targetColIdx) => {
            if (G.ap < 1) { setLocalMsg("⚠️ PG Insuffisants."); return; }
            
            if (selected.machine === 'T') { 
                if (targetPileIdx !== selected.pile) { setLocalMsg("❌ Transtainer : Shift dans SA Pile."); return; } 
                if (targetColIdx === null) { setLocalMsg("❌ Cliquez sur la colonne cible en bas."); return; } 
                if (G.cour[targetPileIdx][targetColIdx].length >= 3) { setLocalMsg("❌ Colonne pleine."); return; } 
                if (!processTutorialAction('shift_detail', [targetColIdx])) return;
            } else { 
                if (Math.abs(targetPileIdx - selected.pile) !== 1) { setLocalMsg("❌ Stacker : Shift Pile ADJACENTE."); return; } 
                const firstNonFull = getFirstNonFullCol(G.cour[targetPileIdx]); 
                if (firstNonFull === -1) { setLocalMsg("❌ Pile adjacente pleine."); return; } 
                targetColIdx = firstNonFull; 
                if (!processTutorialAction('shift_nav', [targetPileIdx])) return;
            }
            
            mutateG(draft => { const block = draft.cour[selected.pile][selected.col].pop(); draft.cour[targetPileIdx][targetColIdx].push(block); draft.ap -= 1; draft.message = `✅ Shiftage réussi (-1 PG)`; });
            setSelected(null); setLocalMsg("");
          };

          const handleParkingClick = (pileIdx) => {
            if (!canInteract) return;
            if (selected && selected.type === 'machine') { handleMachineMove(pileIdx); return; }
            if (selected && selected.type === 'block' && selected.machine === 'S') {
                if (!processTutorialAction('shift_nav', [pileIdx])) return;
                handleShiftDestination(pileIdx, null);
            }
          };

          const handleCraneClick = (craneIndex) => {
            if (!canInteract || !selected || selected.type !== 'block') return;
            if (G.ap < 1) { setLocalMsg("⚠️ PG Insuffisants."); return; }
            const crane = G.cranes[craneIndex]; if (crane.phase === 'done') return;
            const requiredBlockId = getCurrentRequirement(crane); const blockToPlaceId = G.cour[selected.pile][selected.col][G.cour[selected.pile][selected.col].length - 1];
            if (requiredBlockId !== blockToPlaceId) { setLocalMsg(`❌ Erreur : Requis [${BLOCK_TYPES[requiredBlockId].name}].`); return; }
            
            if (!processTutorialAction('click_crane', [craneIndex])) return;

            mutateG(draft => {
                draft.cour[selected.pile][selected.col].pop(); let pointsEarned = BLOCK_TYPES[blockToPlaceId].points;
                const activeCrane = draft.cranes[craneIndex]; activeCrane.progress += 1;
                const currentTotal = activeCrane.phase === 'bay' ? activeCrane.bayData.total : activeCrane.deckData.total;
                if (activeCrane.progress === currentTotal) { if (activeCrane.phase === 'bay') { activeCrane.phase = 'deck'; activeCrane.progress = 0; pointsEarned += 5; draft.message = `✅ Baie scellée !`; } else { activeCrane.phase = 'done'; pointsEarned += 10; draft.message = `🚢 Deck terminé !`; } } 
                else { draft.message = `📦 Posé (-1 PG) !`; }
                
                const targetStacker = tutorialState ? 0 : draft.currentPlayer;

            });
            setSelected(null); setLocalMsg("");
          };

          const handleVoluntarySpelo = () => {

              if (!processTutorialAction('voluntary_spelo', [])) return;

          const endTurn = () => {

              mutateG(draft => {

          const handleUndo = () => { 
              if (!G.history || G.history.length === 0 || !canInteract || tutorialState) return; 
              const newG = JSON.parse(JSON.stringify(G)); const previousState = newG.history.pop(); const restoredG = { ...previousState, history: newG.history }; 
              restoredG.message = "⏪ Undo"; setG(restoredG); 
              if (roomId && db && user) { setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { payload: JSON.stringify(restoredG) }); }

          };

          const renderMachineToken = (type, player = null, isSelected = false) => {
            let baseClass = "flex items-center justify-center font-black shadow-md border cursor-pointer transition-transform duration-200 w-full h-full shrink-0 ";
            if (isSelected) baseClass += "ring-2 ring-yellow-400 scale-110 shadow-[0_0_15px_rgba(250,204,21,0.8)] z-10 ";
            if (type === 'T') return <div className={`${baseClass} bg-yellow-500 border-black rounded-[4px] text-black text-[clamp(12px,2vh,16px)] leading-none`} title="Transtainer (Commun)">T</div>;
            if (type === 'S') return <div className={`${baseClass} ${player===0 ? 'bg-blue-600' : 'bg-red-600'} border-white rounded-full text-white text-[clamp(12px,2vh,16px)] leading-none`} title={`Stacker J${player+1}`}>S{player+1}</div>;
          };

          const currentStepData = tutorialState?.active ? TUTORIAL_STEPS[tutorialState.step] : null;

          return (
            <div className="h-[100dvh] w-screen overflow-hidden bg-slate-950 flex flex-col items-center relative">
              
              {/* =========================================
                  LOBBY (MENU)
              ============================================= */}
              {!G && (
                  <div className="flex flex-col items-center justify-center h-full w-full p-4">
                      <div className="max-w-md w-full bg-slate-900 border-2 border-slate-700 p-6 rounded-xl shadow-2xl text-center z-10">
                          <h1 className="text-3xl font-bold text-blue-400 mb-2 uppercase tracking-widest font-sans">Container Rush</h1>
                          <p className="text-slate-400 mb-6 text-sm">Édition V2.6</p>
                          {localMsg && <div className="bg-red-900/50 border border-red-500 text-red-200 p-2 rounded mb-4 text-sm">{localMsg}</div>}

                          {lobbyMode === 'menu' && (
                              <div className="space-y-4">
                                  <button onClick={() => setLobbyMode('online')} disabled={isAuthLoading} className={`w-full font-bold py-3 px-4 rounded shadow-lg text-sm ${isAuthLoading ? 'bg-slate-600 text-slate-400' : 'bg-blue-700 hover:bg-blue-600 text-white'}`}>
                                      {isAuthLoading ? '⏳ CONNEXION...' : '🌐 JOUER EN LIGNE'}
                                  </button>
                                  <button onClick={() => setLobbyMode('ai')} className="w-full bg-purple-700 hover:bg-purple-600 text-white font-bold py-3 px-4 rounded shadow-lg text-sm">
                                      🤖 JOUER CONTRE L'IA
                                  </button>
                                  <div className="pt-4 border-t border-slate-800">
                                      <button onClick={() => startLocalGame(false)} className="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2 px-4 rounded border border-slate-600 text-xs shadow-md">
                                          💻 SALLE TEST LOCALE
                                      </button>
                                      <button onClick={startInteractiveTutorial} className="w-full mt-3 bg-emerald-800 hover:bg-emerald-700 text-emerald-100 font-bold py-3 px-4 rounded border border-emerald-600 shadow-[0_0_15px_rgba(16,185,129,0.3)] text-sm transition">
                                          🎓 TUTORIEL GUIDÉ
                                      </button>
                                      
                                      <button onClick={() => setShowDevlog(true)} className="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-amber-400 font-bold py-3 px-4 rounded border border-amber-600 shadow-[0_0_10px_rgba(251,191,36,0.2)] text-xs transition">
                                          📝 JOURNAL DE BORD (MISES À JOUR)
                                      </button>
                                  </div>
                              </div>
                          )}

                          {lobbyMode === 'online' && (
                              <div className="space-y-4">
                                  <button onClick={createRoom} className="w-full font-bold py-3 px-4 rounded shadow-lg text-sm bg-emerald-700 hover:bg-emerald-600 text-white">CRÉER SALLE</button>
                                  <div className="flex gap-2">
                                      <input type="text" value={joinCodeInput} onChange={(e) => setJoinCodeInput(e.target.value.toUpperCase())} placeholder="CODE" className="w-2/3 bg-slate-800 border border-slate-600 rounded px-2 text-center font-bold text-white focus:outline-none" maxLength={5} />
                                      <button onClick={joinExistingRoom} className="w-1/3 font-bold py-2 rounded shadow-lg text-sm bg-blue-700 text-white">REJOINDRE</button>
                                  </div>
                                  <button onClick={() => setLobbyMode('menu')} className="w-full bg-slate-800 text-slate-400 py-2 rounded text-xs">Retour</button>
                              </div>
                          )}

                          {lobbyMode === 'ai' && (
                              <div className="space-y-4">
                                  <button onClick={() => { setAiDifficulty('facile'); startLocalGame(true); }} className="w-full bg-green-700 text-white font-bold py-3 rounded">FACILE</button>
                                  <button onClick={() => { setAiDifficulty('moyen'); startLocalGame(true); }} className="w-full bg-yellow-600 text-white font-bold py-3 rounded">MOYEN</button>
                                  <button onClick={() => { setAiDifficulty('difficile'); startLocalGame(true); }} className="w-full bg-red-700 text-white font-bold py-3 rounded">DIFFICILE</button>
                                  <button onClick={() => setLobbyMode('menu')} className="w-full bg-slate-800 text-slate-400 py-2 rounded text-xs">Retour</button>
                              </div>
                          )}
                      </div>
                  </div>
              )}

              {/* =========================================
                  JEU PRINCIPAL
              ============================================= */}
              {G && (
                <div className="h-full w-full flex flex-col p-1 sm:p-2 gap-1.5 relative">
                  {/* 1. HEADER (Code Salle Centré) */}
                  <div className="flex-none flex justify-between items-start bg-slate-900 p-1 md:p-2 rounded border border-slate-800 shadow-md">
                    <div className="flex flex-col w-[30%]">
                        <div className={`w-full text-[clamp(10px,1.5vh,16px)] font-bold px-1 py-0.5 rounded text-center leading-none ${G.currentPlayer === 0 || tutorialState ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-500'}`}>J1: {G.players[0].score} PF</div>
                    </div>
                    <div className="flex flex-col items-center justify-center flex-1 mt-0.5">
                      <div className="flex items-center gap-1 mb-0.5">
                         <button onClick={() => setShowMenuConfirm(true)} className="text-[10px] bg-slate-700 text-white px-2 py-0.5 rounded">🏠</button>
                         {!tutorialState && <button onClick={() => setShowNewGameConfirm(true)} disabled={!canInteract} className="text-[10px] bg-emerald-700 text-white px-2 py-0.5 rounded">🔄</button>}
                         <button onClick={() => setShowRules(true)} className="text-[10px] bg-slate-700 text-blue-300 font-bold px-2 py-0.5 rounded">📖</button>
                      </div>
                      
                      {roomId && !tutorialState && (
                          <div className="flex items-center justify-center gap-2 mt-1 mb-1 w-full">
                              <span className="text-sm md:text-base text-orange-500 font-black bg-orange-950/50 px-3 py-1 rounded-l border border-orange-600 shadow-sm tracking-widest">CODE : {roomId}</span>
                              <button onClick={copyRoomCode} className="text-[10px] md:text-xs bg-orange-600 hover:bg-orange-500 text-white px-3 py-1.5 rounded-r font-bold shadow-sm transition h-full border border-orange-600">COPIER</button>
                          </div>
                      )}
                      
                      <div className="flex items-center gap-1 mt-1">
                        <span className="text-[10px] text-yellow-400 font-bold bg-black px-2 py-0.5 rounded border border-yellow-600">PG: {G.ap}/4</span>
                        {!tutorialState && <button onClick={handleUndo} disabled={!G.history?.length || !canInteract} className="px-1.5 py-0.5 rounded border text-[10px] bg-slate-700 text-white">↩️</button>}
                        <button onClick={endTurn} disabled={!canInteract && !tutorialState} className={`px-2 py-0.5 rounded font-bold text-[10px] bg-red-700 text-white ${getTutoClass('PASS_BTN')}`}>PASSER</button>
                      </div>
                    </div>
                    <div className="flex flex-col w-[30%] items-end">
                        <div className={`w-full text-[clamp(10px,1.5vh,16px)] font-bold px-1 py-0.5 rounded text-center leading-none ${G.currentPlayer === 1 && !tutorialState ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-500'}`}>{tutorialState ? 'TUTO' : `J2: ${G.players[1].score} PF`}</div>
                    </div>
                  </div>

                  <div className="flex-none bg-black px-2 py-1 text-center text-emerald-400 border border-slate-800 rounded text-[clamp(10px,1.8vh,16px)] font-semibold shadow-inner truncate leading-tight">
                    {G.message} {localMsg && <span className="text-red-400 ml-2">{localMsg}</span>}
                  </div>

                  {/* 2. PLANS (Grues) */}
                  <div className="flex-[1.2] min-h-0 flex flex-row justify-between gap-1 sm:gap-2 w-full">
                    {G.cranes.map((crane, idx) => {
                      const isDone = crane.phase === 'done'; 
                      const reqBlock = getCurrentRequirement(crane);
                      
                      return (
                        <div key={crane.id} onClick={() => handleCraneClick(idx)} className={`p-1 md:p-1.5 rounded-xl border-2 flex-1 min-w-0 flex flex-col gap-1 md:gap-1.5 ${isDone ? 'bg-slate-950 border-emerald-900 opacity-70' : 'bg-slate-800 border-slate-600 hover:border-slate-400 cursor-pointer shadow-xl'} ${getTutoClass('CRANE_'+idx)} transition-colors`}>
                          
                          {/* En-tête Grue */}
                          <div className="flex justify-between items-center z-10 border-b border-white/10 pb-1 flex-none pointer-events-none shrink-0">
                              <span className="font-bold text-[9px] md:text-[11px] text-white truncate tracking-wider">{crane.name}</span>
                              <div className="w-[18px] md:w-[22px] aspect-square flex-none shrink-0">
                                 {!isDone && reqBlock && <BlockTile blockId={reqBlock} isAccessible={false} isSelected={false} status="normal" isMini={true} />}
                              </div>
                          </div>
                          
                          {/* Cartes Baie et Deck */}
                          {!isDone ? (
                            <div className="flex-1 min-h-0 flex flex-col gap-1.5 justify-center pointer-events-none">
                                <div className="flex-1 min-h-0 w-full"><MiniMap layoutData={crane.deckData} progress={crane.phase === 'deck' ? crane.progress : 0} type="deck" isActive={crane.phase === 'deck'} name="DECK" /></div>
                                <div className="flex-1 min-h-0 w-full"><MiniMap layoutData={crane.bayData} progress={crane.phase === 'bay' ? crane.progress : crane.bayData.total} type="bay" isActive={crane.phase === 'bay'} name="BAIE" /></div>
                            </div>
                          ) : (
                            <div className="flex-1 flex items-center justify-center text-emerald-600 font-black text-lg md:text-2xl pointer-events-none tracking-widest drop-shadow-md">SCELLÉ</div>
                          )}
                          
                        </div>
                      );
                    })}
                  </div>

                  {/* 3. FLOTTE (Machines Globales) */}
                  <div className="flex-none bg-slate-900 border border-slate-700 rounded-lg p-1.5 flex items-center justify-between shadow-md">
                      <div className="flex gap-2 w-full justify-around h-[5vh] max-h-[40px] min-h-[30px]">
                          <div onClick={() => handleMachineSelect('S', 0)} className={`flex items-center gap-1 w-1/4 max-w-[100px] rounded ${getTutoClass('FLEET_S0')}`}>
                              <div className="h-full aspect-square shrink-0 pointer-events-none">{renderMachineToken('S', 0, selected?.type==='machine' && selected.id===0)}</div>
                              <span className="text-[clamp(9px,1.4vh,12px)] text-slate-500 hidden sm:block truncate pointer-events-none">{G.stackers[0]===null ? 'Spelo' : `P${G.stackers[0]+1}`}</span>
                          </div>
                          <div onClick={() => handleMachineSelect('S', 1)} className="flex items-center gap-1 w-1/4 max-w-[100px]">
                              <div className="h-full aspect-square shrink-0 pointer-events-none">{renderMachineToken('S', 1, selected?.type==='machine' && selected.id===1)}</div>
                              <span className="text-[clamp(9px,1.4vh,12px)] text-slate-500 hidden sm:block truncate pointer-events-none">{G.stackers[1]===null ? 'Spelo' : `P${G.stackers[1]+1}`}</span>
                          </div>
                          <div onClick={() => handleMachineSelect('T', 'T')} className={`flex items-center gap-1 w-1/4 max-w-[100px] rounded ${getTutoClass('FLEET_T')}`}>
                              <div className="h-full aspect-square shrink-0 pointer-events-none">{renderMachineToken('T', null, selected?.type==='machine' && selected.id==='T')}</div>
                          </div>
                          <div className="border-l border-slate-700 pl-2 flex items-center justify-center flex-1">
                              <button onClick={handleVoluntarySpelo} className="flex flex-col items-center justify-center bg-slate-800 border border-slate-600 rounded px-2 h-full w-full max-w-[100px]">
                                  <span className="text-[clamp(8px,1.4vh,12px)] font-bold text-slate-300 leading-none">SPELO</span>
                                  <span className="text-[clamp(6px,1vh,9px)] text-slate-500 leading-none">(2 PG)</span>
                              </button>
                          </div>
                      </div>
                  </div>

                  {/* 4. NAVIGATEUR (Mini-Cour) */}
                  <div className="flex-[0.6] w-full bg-black/50 border border-slate-800 rounded-lg p-1.5 flex flex-col justify-center">
                      <div className="flex w-full justify-between items-end gap-[2px] sm:gap-1 h-full max-h-[80px]">
                          {G.cour.map((pile, pIdx) => {
                              const isT = G.transtainer === pIdx;
                              const isTAura = Math.abs(G.transtainer - pIdx) <= 1;
                              const isS1 = G.stackers[0] === pIdx;
                              const isS2 = G.stackers[1] === pIdx;
                              const isActiveView = activePileIdx === pIdx;
                              let isValidShiftTarget = false;
                              if (selected?.type === 'block' && selected.machine === 'S') isValidShiftTarget = Math.abs(selected.pile - pIdx) === 1;

                              return (
                                  <div key={pIdx} onClick={() => handlePileNavigatorClick(pIdx)} 
                                       className={`relative flex flex-col items-center flex-1 rounded bg-slate-900 h-full justify-end pb-1 border-t-2 border-b-2
                                          ${isActiveView ? 'border-white bg-slate-800 scale-105 z-10 shadow-[0_0_10px_rgba(255,255,255,0.2)]' : 'border-slate-800'}
                                          ${isTAura && !isActiveView ? 'border-t-red-900 bg-red-950/20' : ''}
                                          ${isValidShiftTarget ? 'border-yellow-400 bg-yellow-900/30 animate-pulse' : ''}
                                          ${getTutoClass('NAV_'+pIdx)}
                                       `}
                                  >
                                      <div className="absolute top-1 w-full flex justify-center pointer-events-none">
                                          {isT && <div className="w-[35%] max-w-[12px] aspect-square bg-yellow-500 rounded-[2px] shadow-sm z-20"></div>}
                                      </div>
                                      <div className="absolute left-[5%] top-1/2 transform -translate-y-1/2 flex flex-col gap-[2px] w-[25%] max-w-[8px] z-20 pointer-events-none">
                                          {isS1 && <div className="w-full aspect-square bg-blue-600 rounded-full shadow-sm border border-white/50"></div>}
                                          {isS2 && <div className="w-full aspect-square bg-red-600 rounded-full shadow-sm border border-white/50"></div>}
                                      </div>
                                      <div className="flex gap-[1px] items-end justify-center w-full h-[55%] px-[2px] z-10 pointer-events-none">
                                          {pile.map((col, cIdx) => (
                                              <div key={cIdx} className="flex flex-col-reverse justify-start gap-[1px] w-1/4 max-w-[8px] h-full">
                                                  {col.map((bId, bIdx) => (
                                                      <div key={bIdx} className="w-full h-[30%] rounded-[1px]" style={{background: bId === 'HAZ' ? '#f97316' : BLOCK_TYPES[bId].style.backgroundColor}}></div>
                                                  ))}
                                              </div>
                                          ))}
                                      </div>
                                      <span className="text-[clamp(7px,1.2vh,10px)] font-bold text-slate-400 mt-0.5 leading-none pointer-events-none">P{pIdx+1}</span>
                                  </div>
                              );
                          })}
                      </div>
                  </div>

                  {/* 5. VUE DÉTAILLÉE (La Pile Active) */}
                  <div className="flex-[1.2] min-h-0 w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-2 shadow-inner flex flex-col items-center relative overflow-hidden">
                      <button onClick={() => setActivePileIdx(prev => prev > 0 ? prev - 1 : 9)} className="absolute left-0 top-0 bottom-0 w-[10%] max-w-[40px] text-slate-500 hover:text-white flex items-center justify-center font-bold text-2xl bg-gradient-to-r from-black/30 to-transparent z-10">&lt;</button>
                      <button onClick={() => setActivePileIdx(prev => prev < 9 ? prev + 1 : 0)} className="absolute right-0 top-0 bottom-0 w-[10%] max-w-[40px] text-slate-500 hover:text-white flex items-center justify-center font-bold text-2xl bg-gradient-to-l from-black/30 to-transparent z-10">&gt;</button>

                      <h3 className="flex-none text-[clamp(12px,2vh,18px)] font-bold text-white mb-2 tracking-widest uppercase border-b border-slate-600 pb-1 leading-none">FOCUS : PILE {activePileIdx + 1}</h3>
                      {Math.abs(G.transtainer - activePileIdx) <= 1 && (<div className="absolute top-0 left-12 right-12 h-1.5 bg-red-900/50 rounded-b-lg"></div>)}

                      <div className="flex-1 min-h-0 flex items-end justify-center gap-2 sm:gap-4 w-full pb-2">
                          <div className="text-[clamp(8px,1.5vh,12px)] text-slate-500 -rotate-90 origin-bottom-left uppercase tracking-widest mb-4 flex-none">Avant</div>
                          
                          {/* Parking Detail */}
                          <div className={`w-[15vw] max-w-[70px] h-[65%] flex flex-col justify-end items-center pb-2 rounded border-b-4 bg-slate-800 cursor-pointer ${Math.abs(G.transtainer - activePileIdx) <= 1 ? 'border-red-700 bg-red-950/30' : 'border-slate-500'}`} onClick={() => handleParkingClick(activePileIdx)}>
                              {G.transtainer === activePileIdx && <div className={`w-[85%] max-w-[50px] aspect-square mb-1.5 rounded shrink-0 ${getTutoClass('PARKING_T', activePileIdx)}`} onClick={(e) => { e.stopPropagation(); handleMachineSelect('T', 'T'); }}>{renderMachineToken('T', null, selected?.type==='machine' && selected.id==='T')}</div>}
                              {G.stackers[0] === activePileIdx && <div className="w-[85%] max-w-[50px] aspect-square mb-1.5 shrink-0" onClick={(e) => { e.stopPropagation(); handleMachineSelect('S', 0); }}>{renderMachineToken('S', 0, selected?.type==='machine' && selected.id===0)}</div>}
                              {G.stackers[1] === activePileIdx && <div className="w-[85%] max-w-[50px] aspect-square mb-1.5 shrink-0" onClick={(e) => { e.stopPropagation(); handleMachineSelect('S', 1); }}>{renderMachineToken('S', 1, selected?.type==='machine' && selected.id===1)}</div>}
                              {G.stackers[0] !== activePileIdx && G.stackers[1] !== activePileIdx && G.transtainer !== activePileIdx && <span className="text-[clamp(8px,1.5vh,12px)] text-slate-500 pointer-events-none">PARK</span>}
                          </div>

                          {/* Colonnes Detail */}
                          <div className="flex gap-1.5 sm:gap-2 h-full items-end">
                              {G.cour[activePileIdx].map((col, cIdx) => {
                                  const isT_Here = G.transtainer === activePileIdx;
                                  const targetStacker = tutorialState ? 0 : G.currentPlayer;
                                  const isS_Here = G.stackers[targetStacker] === activePileIdx;
                                  const firstAvailCol = getFirstAvailCol(G.cour[activePileIdx]);

                                  return (
                                      <div key={cIdx} onClick={() => handleColClickDetail(cIdx)} className={`w-[12vw] max-w-[65px] h-[90%] bg-slate-950/80 rounded flex flex-col-reverse justify-start items-center p-1 border-x border-t border-slate-700 transition ${selected?.type === 'block' && selected.pile === activePileIdx && selected.col === cIdx ? 'bg-yellow-400/20 border-yellow-400' : col.length >= 3 ? 'border-b-4 border-b-slate-950' : 'border-b border-b-slate-700'} ${getTutoClass('DETAIL_COL_' + cIdx, activePileIdx)}`}>
                                          {col.map((blockId, bIdx) => {
                                              const isTopBlock = bIdx === col.length - 1;
                                              let isAccessible = false;
                                              if (isTopBlock && canInteract) {
                                                  if (isT_Here) isAccessible = true; 
                                                  if (isS_Here && cIdx === firstAvailCol) isAccessible = true;
                                              }

                                              return (
                                                  <div key={bIdx} className="w-full aspect-square mb-1 shrink-0">
                                                        <BlockTile blockId={blockId} isSelected={isTopBlock && selected?.type === 'block' && selected.pile === activePileIdx && selected.col === cIdx} isAccessible={isAccessible} status="normal" />
                                                  </div>
                                              );
                                          })}
                                          {/* Helper Visuel Shift Transtainer */}
                                          {selected?.type === 'block' && selected.machine === 'T' && selected.pile === activePileIdx && col.length < 3 && (
                                              <div className={`w-full aspect-square shrink-0 border border-dashed border-yellow-400/50 rounded mt-1 flex items-center justify-center bg-yellow-400/10 ${getTutoClass('DETAIL_SHIFT_' + cIdx, activePileIdx)}`}>
                                                  <span className="text-[clamp(10px,2vh,16px)] text-yellow-200 pointer-events-none">⬇️</span>
                                              </div>
                                          )}
                                      </div>
                                  )
                              })}
                          </div>
                          <div className="text-[clamp(8px,1.5vh,12px)] text-slate-500 uppercase tracking-widest mb-4 flex-none">Fond</div>
                      </div>
                  </div>

                  {/* BULLE DU TUTORIEL (EN HAUT) */}
                  {tutorialState && tutorialState.active && currentStepData && (
                    tutorialState.minimized ? (
                      <button onClick={() => setTutorialState(prev => ({...prev, minimized: false}))} className="absolute top-24 right-4 bg-emerald-600 border-2 border-white text-white px-4 py-2 rounded-full font-bold shadow-lg z-[100] animate-pulse">
                          [+] Afficher Tuto ({tutorialState.step})
                      </button>
                    ) : currentStepData.type === 'ai_turn' || currentStepData.type === 'info' ? (
                        <div className="absolute inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
                            <div className="bg-slate-900 border-4 border-emerald-400 p-8 rounded-2xl shadow-[0_0_50px_rgba(16,185,129,0.5)] max-w-xl w-full text-center flex flex-col items-center">
                                <div className="text-5xl mb-4">🎓</div>
                                <h3 className="text-emerald-400 font-black text-2xl mb-4 tracking-widest uppercase">{currentStepData.title}</h3>
                                <p className="text-white text-lg mb-8 leading-relaxed">{currentStepData.text}</p>
                                <button 
                                    onClick={() => {
                                        if (currentStepData.type === 'ai_turn' && currentStepData.execute) { mutateG(currentStepData.execute); }
                                        if (currentStepData.action === 'end') { returnToMenu(); } 
                                        else { setTutorialState(prev => ({...prev, step: prev.step + 1})); }
                                    }}
                                    className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-8 rounded-lg text-xl shadow-lg transition transform hover:scale-105"
                                >
                                    {currentStepData.action === 'end' ? 'Terminer' : 'Continuer ▶'}
                                </button>
                            </div>
                        </div>
                    ) : (
                      <div className="absolute top-[18vh] left-1/2 transform -translate-x-1/2 bg-slate-900 border-2 border-emerald-400 p-4 rounded-xl shadow-[0_0_30px_rgba(16,185,129,0.8)] z-[100] w-11/12 max-w-lg text-center flex flex-col items-center">
                          <div className="flex justify-between items-center w-full mb-2 border-b border-slate-700 pb-1">
                              <h3 className="text-emerald-300 font-black text-xs tracking-widest uppercase">Étape {tutorialState.step} / {TUTORIAL_STEPS.length - 1}</h3>
                              <button onClick={() => setTutorialState(prev => ({...prev, minimized: true}))} className="text-slate-400 hover:text-white font-bold px-2 py-1 bg-slate-800 rounded text-xs border border-slate-600">[-] Réduire</button>
                          </div>
                          <p className="text-white text-sm md:text-base font-bold leading-snug mb-3">{currentStepData.text}</p>
                          <button onClick={resetTutorialSelection} className="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-4 py-1.5 rounded text-xs font-bold transition shadow-md flex items-center justify-center gap-2 mx-auto">
                              <span>↻</span> Recommencer l'étape
                          </button>
                      </div>
                    )
                  )}
                </div>
              )}

              {/* RÈGLES STANDARDS (RÈGLES DE NAVIGATION ET RAPPEL DES PF) */}
              {showRules && (
                <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300">
                    <button onClick={() => setShowRules(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">FERMER</button>
                    <h2 className="text-2xl font-bold text-blue-400 mb-4 border-b border-slate-700 pb-2">📖 RÈGLES DE NAVIGATION</h2>
                    
                    {/* Rappel Visuel des Points de Fret (PF) */}
                    <div className="bg-slate-800 p-3 rounded-lg mb-4 text-xs sm:text-sm font-bold flex flex-wrap gap-2 justify-center border border-slate-700 shadow-inner">
                        <span className="bg-slate-900 px-2 py-1 rounded border-2 border-slate-300">⬜ Léger: <span className="text-yellow-400">1 PF</span></span>
                        <span className="bg-slate-900 px-2 py-1 rounded border-2 border-slate-500">🔲 Moyen: <span className="text-yellow-400">2 PF</span></span>
                        <span className="bg-slate-900 px-2 py-1 rounded border-2 border-black">⬛ Lourd: <span className="text-yellow-400">1 PF</span></span>
                        <span className="bg-slate-900 px-2 py-1 rounded border-2 border-cyan-800">❄️ Reef: <span className="text-yellow-400">3 PF</span></span>
                        <span className="bg-slate-900 px-2 py-1 rounded border-2 border-orange-500">☢️ Haz: <span className="text-yellow-400">4 PF</span></span>
                        <span className="bg-slate-900 px-2 py-1 rounded border-2 border-green-800">♊ Twin: <span className="text-yellow-400">5 PF</span></span>
                    </div>

                    <ul className="space-y-4 mb-4">
                        <li><strong className="text-yellow-400">FLOTTE (Haut) :</strong> Sélectionnez votre machine (S ou T).</li>
                        <li><strong className="text-emerald-400">NAVIGATEUR (Milieu) :</strong> Cliquez sur une pile pour y déplacer la machine sélectionnée.</li>
                        <li><strong className="text-blue-400">VUE DÉTAILLÉE (Bas) :</strong> Cliquez sur les conteneurs entourés de <span className="text-cyan-400 font-bold">cyan</span> pour les extraire.</li>
                    </ul>
                    <p className="mb-4 bg-slate-800 p-3 rounded"><strong className="text-white">COÛTS :</strong> Vous avez 4 PG par tour. Bouger coûte 1 PG. Extraire et Poser coûte 1 PG.</p>
                    <p className="text-red-400 font-bold border-l-4 border-red-500 pl-3">ZONE DE SÉCURITÉ DU TRANSTAINER : La pile où se trouve le T et ses 2 voisines sont interdites aux Stackers (Expulsion en Spelo !)</p>
                  </div>
                </div>
              )}

              {/* MODAL DU JOURNAL DE BORD (DEVLOG) */}
              {showDevlog && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300 text-left">
                      <button onClick={() => setShowDevlog(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">FERMER</button>
                      <h2 className="text-2xl font-bold text-emerald-400 mb-6 border-b border-slate-700 pb-2 font-sans tracking-widest uppercase">📝 Journal de Bord</h2>
                      <div className="space-y-6">
                          <div>
                              <h3 className="text-lg font-bold text-white flex items-center gap-2"><span className="bg-emerald-600 text-white px-2 py-0.5 rounded text-xs">V5.3</span> Correction Visuelle des Cartes</h3>
                              <ul className="list-disc pl-5 mt-2 text-sm space-y-1 text-slate-400">
                                  <li>Refonte du composant des cartes Pré-Plan. Utilisation de la technologie Flexbox avec une hauteur mathématique proportionnelle pour garantir que les conteneurs forment toujours des cubes parfaits, sans déborder ni s'aplatir.</li>
                              </ul>
                          </div>
                          <div>
                              <h3 className="text-lg font-bold text-slate-300">V5.2 - Cartes Premium HD</h3>
                              <ul className="list-disc pl-5 mt-2 text-sm space-y-1 text-slate-400">
                                  <li>Ajout des textures et de l'aspect 3D sur les blocs pour mimer la sensation du vrai jeu de plateau.</li>
                              </ul>
                          </div>
                          <div>
                              <h3 className="text-lg font-bold text-slate-300">V5.1 - Ergonomie Multijoueur</h3>
                              <ul className="list-disc pl-5 mt-2 text-sm space-y-1 text-slate-400">
                                  <li>Le code de la salle en ligne a été agrandi, centré et mis en orange vif pour faciliter le partage entre joueurs.</li>
                              </ul>
                          </div>
                      </div>
                    </div>
                  </div>
              )}

              {/* MODALS CONFIRM */}
              {showNewGameConfirm && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl p-6 text-center text-slate-300 shadow-2xl">
                        <h2 className="text-xl font-bold text-emerald-400 mb-4">NOUVELLE PARTIE</h2>
                        <div className="flex justify-center gap-6 mt-4">
                            <button onClick={()=>setShowNewGameConfirm(false)} className="px-6 py-2 bg-slate-700 rounded font-bold">Annuler</button>
                            <button onClick={()=>{handleRestartGame();setShowNewGameConfirm(false);}} className="px-6 py-2 bg-emerald-700 text-white rounded font-bold">Confirmer</button>
                        </div>
                    </div>
                  </div>
              )}

              {showMenuConfirm && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl p-6 text-center text-slate-300 shadow-2xl">
                        <h2 className="text-xl font-bold text-blue-400 mb-4">RETOUR AU MENU</h2>
                        <div className="flex justify-center gap-6 mt-4">
                            <button onClick={()=>setShowMenuConfirm(false)} className="px-6 py-2 bg-slate-700 rounded font-bold">Annuler</button>
                            <button onClick={() => { setShowMenuConfirm(false); returnToMenu(); }} className="px-6 py-2 bg-blue-700 text-white rounded font-bold">Quitter</button>
                        </div>
                    </div>
                  </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
