                              className="w-full bg-slate-800 text-white border-2 border-slate-600 rounded p-3 text-center text-xl font-bold mb-6 uppercase focus:border-orange-500 outline-none"
                          />
                          <button 
                              onClick={submitSoloScore} 
                              disabled={!playerNameInput.trim()}
                              className={`w-full font-bold py-3 rounded text-lg ${playerNameInput.trim() ? 'bg-orange-600 hover:bg-orange-500 text-white' : 'bg-slate-700 text-slate-500'}`}
                          >
                              ENREGISTRER
                          </button>
                          <button onClick={() => setQualifiesForLeaderboard(false)} className="w-full mt-4 text-slate-400 underline text-sm">Passer (Ne pas sauvegarder)</button>
                      </div>
                  </div>
              )}

              {/* RÈGLES STANDARDS MULTI */}
              {showRules && (
                <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300">
                    <button onClick={() => setShowRules(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">FERMER</button>
                    <h2 className="text-2xl font-bold text-blue-400 mb-4 border-b border-slate-700 pb-2">📖 RÈGLES DE NAVIGATION (MULTI)</h2>
                    <ul className="space-y-4 mb-4">
                        <li><strong className="text-yellow-400">FLOTTE (Haut) :</strong> Sélectionnez votre machine (S ou T).</li>
                        <li><strong className="text-emerald-400">NAVIGATEUR (Milieu) :</strong> Cliquez sur une pile pour y déplacer la machine sélectionnée.</li>
                        <li><strong className="text-blue-400">VUE DÉTAILLÉE (Bas) :</strong> Cliquez sur les conteneurs entourés de <span className="text-cyan-400 font-bold">cyan</span> pour les extraire.</li>
                    </ul>
                    <p className="mb-4 bg-slate-800 p-3 rounded"><strong className="text-white">COÛTS :</strong> Vous avez 4 PG par tour. Bouger coûte 1 PG. Extraire et Poser coûte 1 PG.</p>
                    <p className="text-red-400 font-bold border-l-4 border-red-500 pl-3">ZONE DE SÉCURITÉ DU TRANSTAINER : La pile où se trouve le T et ses 2 voisines sont interdites aux Stackers (Expulsion en Spelo !)</p>
                  </div>
                </div>
              )}

              {/* RÈGLES SOLO */}
              {showSoloRules && (
                <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-orange-500 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300">
                    <button onClick={() => setShowSoloRules(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">FERMER</button>
                    <h2 className="text-2xl font-bold text-orange-400 mb-4 border-b border-orange-800 pb-2">📦 LE TEST À BRETELLES</h2>
                    <p className="mb-4 text-white">Ce mode est un puzzle d'optimisation pure. Il n'y a plus de tours ni d'adversaires.</p>
                    <ul className="space-y-4 mb-4 list-disc pl-5">
                        <li><strong className="text-orange-400">Objectif :</strong> Terminer les 3 Decks en utilisant le <strong>moins de PG possible</strong>.</li>
                        <li><strong className="text-emerald-400">Contrôle Total :</strong> Vous pilotez S1 (Bleu), S2 (Rouge) ET le Transtainer (Jaune).</li>
                        <li><strong className="text-blue-400">L'Équité :</strong> Chaque "Niveau" génère toujours exactement la même disposition de départ pour tous les joueurs au monde.</li>
                        <li><strong className="text-yellow-400">Le Spelo-Trick :</strong> Utilisez le Transtainer ou un Stacker pour écraser votre autre Stacker et l'envoyer en Spelo. Sa prochaine sortie coûtera 0 PG !</li>
                    </ul>
                  </div>
                </div>
              )}

              {/* DEVLOG MODAL */}
              {showDevlog && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300 text-left">
                      <button onClick={() => setShowDevlog(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">FERMER</button>
                      <h2 className="text-2xl font-bold text-emerald-400 mb-6 border-b border-slate-700 pb-2 font-sans tracking-widest uppercase">📝 Journal de Bord</h2>
                      <div className="space-y-6">
                          <div>
                              <h3 className="text-lg font-bold text-white flex items-center gap-2"><span className="bg-emerald-600 text-white px-2 py-0.5 rounded text-xs">V2.8</span> Le Test à Bretelles</h3>
                              <ul className="list-disc pl-5 mt-2 text-sm space-y-1 text-slate-400">
                                  <li>Ajout du mode campagne Solo "Le Test à Bretelles".</li>
                                  <li>Implémentation d'un algorithme de "Seed" pour garantir que chaque niveau (1 à 10) est identique pour tous les joueurs.</li>
                                  <li>Intégration d'un classement mondial (Leaderboard Top 10) pour l'optimisation des PG.</li>
                              </ul>
                          </div>
                      </div>
                    </div>
                  </div>
              )}

              {/* MODALS CONFIRM */}
              {showNewGameConfirm && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl p-6 text-center text-slate-300 shadow-2xl">
                        <h2 className="text-xl font-bold text-emerald-400 mb-4">RECHARGER LE NIVEAU / PARTIE</h2>
                        <div className="flex justify-center gap-6 mt-4">
                            <button onClick={()=>setShowNewGameConfirm(false)} className="px-6 py-2 bg-slate-700 rounded font-bold">Annuler</button>
                            <button onClick={()=>{handleRestartGame();setShowNewGameConfirm(false);}} className="px-6 py-2 bg-emerald-700 text-white rounded font-bold">Confirmer</button>
                        </div>
                    </div>
                  </div>
              )}

              {showMenuConfirm && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl p-6 text-center text-slate-300 shadow-2xl">
                        <h2 className="text-xl font-bold text-blue-400 mb-4">RETOUR AU MENU</h2>
                        <div className="flex justify-center gap-6 mt-4">
                            <button onClick={()=>setShowMenuConfirm(false)} className="px-6 py-2 bg-slate-700 rounded font-bold">Annuler</button>
                            <button onClick={() => { setShowMenuConfirm(false); returnToMenu(); }} className="px-6 py-2 bg-blue-700 text-white rounded font-bold">Quitter</button>
                        </div>
                    </div>
                  </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
