    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { touch-action: manipulation; overscroll-behavior: none; }
        @keyframes bounce-slight { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        .animate-bounce-slight { animation: bounce-slight 2s infinite ease-in-out; }
        
        /* ANIMATIONS SUR-MESURE POUR LES HALOS LUMINEUX */
        .base-shadow { box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.3); }
        .selected-shadow { box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.3), 0 0 15px rgba(250,204,21,0.8); }
        
        @keyframes pulse-halo-cyan {
            0%, 100% { outline-color: rgba(34, 211, 238, 0.3); box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.3), 0 0 5px rgba(34, 211, 238, 0.2); }
            50% { outline-color: rgba(34, 211, 238, 1); box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.3), 0 0 15px rgba(34, 211, 238, 0.8); }
        }
        .animate-halo-cyan { outline: 2px solid rgba(34, 211, 238, 1); outline-offset: 1px; animation: pulse-halo-cyan 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        @keyframes pulse-halo-yellow {
            0%, 100% { outline-color: rgba(250, 204, 21, 0.3); box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.3), 0 0 5px rgba(250, 204, 21, 0.2); }
            50% { outline-color: rgba(250, 204, 21, 1); box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.3), 0 0 15px rgba(250, 204, 21, 0.8); }
        }
        .animate-halo-yellow { outline: 2px solid rgba(250, 204, 21, 1); outline-offset: 1px; animation: pulse-halo-yellow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>

              mutateG(draft => { if (!tutorialState) draft.currentPlayer = draft.currentPlayer === 0 ? 1 : 0; draft.ap = 4; draft.message = tutorialState ? t('your_turn') : `${t('to_player')} ${draft.currentPlayer + 1}`; }); 
              setSelected(null); setLocalMsg("");
          };
          
          const handleUndo = () => { 
              if (!G.history || G.history.length === 0 || !canInteract || tutorialState) return; 
              const newG = JSON.parse(JSON.stringify(G)); const previousState = newG.history.pop(); const restoredG = { ...previousState, history: newG.history }; 
              restoredG.message = t('undo'); setG(restoredG); 
              if (roomId && db && user && restoredG.gameMode !== 'solo') { setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { payload: JSON.stringify(restoredG) }); } 
              setSelected(null); setLocalMsg("");
          };

          const renderMachineToken = (type, player = null, isSelected = false) => {
            let baseClass = "flex items-center justify-center font-black shadow-md border cursor-pointer transition-transform duration-200 w-full h-full shrink-0 ";
            if (isSelected) baseClass += "ring-2 ring-yellow-400 scale-110 shadow-[0_0_15px_rgba(250,204,21,0.8)] z-10 ";
            if (type === 'T') return <div className={`${baseClass} bg-yellow-500 border-black rounded-[4px] text-black text-[clamp(12px,2vh,16px)] leading-none`} title="Transtainer (Commun)">T</div>;
            if (type === 'S') return <div className={`${baseClass} ${player===0 ? 'bg-blue-600' : 'bg-red-600'} border-white rounded-full text-white text-[clamp(12px,2vh,16px)] leading-none`} title={`Stacker J${player+1}`}>S{player+1}</div>;
          };

          const currentStepData = tutorialState?.active ? getTutorialSteps(t, tutorialState.mode)[tutorialState.step] : null;

          return (
            <div className="h-[100dvh] w-screen overflow-hidden bg-slate-950 flex flex-col items-center relative">
              
              {/* LOBBY (MENUS) */}
              {!G && (
                  <div className="flex flex-col items-center justify-center h-full w-full p-4 relative z-10">
                      <div className="max-w-md w-full bg-slate-900 border-2 border-slate-700 p-6 rounded-xl shadow-2xl text-center">
                          <h1 className="text-3xl font-bold text-blue-400 mb-2 uppercase tracking-widest font-sans">Container Rush</h1>
                          <p className="text-slate-400 mb-6 text-sm">{t('edition')}</p>
                          {localMsg && <div className="bg-red-900/50 border border-red-500 text-red-200 p-2 rounded mb-4 text-sm">{localMsg}</div>}

                          {lobbyMode === 'menu' && (
                              <div className="space-y-4">
                                  <button onClick={() => setLobbyMode('online')} disabled={isAuthLoading} className={`w-full font-bold py-3 px-4 rounded shadow-lg text-sm ${isAuthLoading ? 'bg-slate-600 text-slate-400' : 'bg-blue-700 hover:bg-blue-600 text-white'}`}>
                                      {isAuthLoading ? t('connecting') : t('btn_online')}
                                  </button>
                                  <div className="pt-2"></div>
                                  <button onClick={() => setLobbyMode('solo_menu')} className="w-full font-bold py-4 px-4 rounded shadow-lg text-sm bg-orange-700 hover:bg-orange-600 text-white border border-orange-500">
                                      {t('btn_solo')}
                                  </button>
                                  <button onClick={() => setLobbyMode('ai')} className="w-full bg-purple-700 hover:bg-purple-600 text-white font-bold py-3 px-4 rounded shadow-lg text-sm">
                                      {t('btn_ai')}
                                  </button>
                                  <div className="pt-4 border-t border-slate-800">
                                      <button onClick={startInteractiveTutorial} className="w-full mb-3 bg-emerald-800 hover:bg-emerald-700 text-emerald-100 font-bold py-3 px-4 rounded border border-emerald-600 shadow-[0_0_15px_rgba(16,185,129,0.3)] text-sm transition">
                                          {t('btn_tuto')}
                                      </button>
                                      
                                      {/* BOUTON FEEDBACK PRO */}
                                      <button onClick={() => setShowFeedback(true)} className="w-full mb-3 bg-slate-800 hover:bg-slate-700 text-cyan-300 font-bold py-3 px-4 rounded border border-cyan-700 shadow-md text-sm transition">
                                          {t('btn_contact')}
                                      </button>

                                      <div className="flex gap-2 mb-4">
                                          <button onClick={() => startLocalGame(false)} className="w-1/2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2 px-2 rounded border border-slate-600 text-xs shadow-md">
                                              {t('btn_test')}
                                          </button>
                                          <button onClick={() => setShowDevlog(true)} className="w-1/2 bg-slate-800 hover:bg-slate-700 text-amber-400 font-bold py-2 px-2 rounded border border-amber-600 shadow-[0_0_10px_rgba(251,191,36,0.2)] text-xs transition">
                                              {t('btn_devlog')}
                                          </button>
                                      </div>
                                      
                                      <div className="flex justify-center items-center gap-3 pt-2 border-t border-slate-800/50">
                                          <span className="text-xs text-slate-500 font-bold">LANGUE / LANGUAGE</span>
                                          <div className="flex gap-1 bg-slate-950 border border-slate-700 p-1 rounded-md shadow-inner">
                                              <button onClick={() => setLang('fr')} className={`px-4 py-1.5 rounded text-[10px] font-bold transition-all ${lang === 'fr' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>FR</button>
                                              <button onClick={() => setLang('en')} className={`px-4 py-1.5 rounded text-[10px] font-bold transition-all ${lang === 'en' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>EN</button>
                                          </div>
                                      </div>
                                  </div>
                                  
                                  {/* MENTIONS LÉGALES */}
                                  <div className="mt-6 pt-4 text-center text-[10px] text-slate-500 border-t border-slate-800">
                                      {t('legal_text1')}<br/>
                                      {t('legal_text2')}
                                  </div>
                              </div>
                          )}

                          {lobbyMode === 'solo_menu' && (
                              <div className="flex flex-col h-full w-full relative">
                                  <button onClick={() => setLobbyMode('menu')} className="absolute -top-2 -right-2 text-slate-400 hover:text-white font-bold text-xl leading-none">&times;</button>
                                  <h2 className="text-xl font-bold text-orange-400 mb-2 tracking-widest text-center">{t('solo_levels')}</h2>
                                  
                                  {/* TABS */}
                                  <div className="flex justify-center gap-2 mb-4">
                                      <button onClick={() => setSoloTab('facile')} className={`px-3 py-1.5 font-bold rounded text-xs ${soloTab === 'facile' ? 'bg-green-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{t('facile')}</button>
                                      <button onClick={() => setSoloTab('moyen')} className={`px-3 py-1.5 font-bold rounded text-xs ${soloTab === 'moyen' ? 'bg-yellow-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{t('moyen')}</button>
                                      <button onClick={() => setSoloTab('difficile')} className={`px-3 py-1.5 font-bold rounded text-xs ${soloTab === 'difficile' ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{t('difficile')}</button>
                                  </div>

                                  {/* EXPLICATIONS DE NIVEAU (Remontées en haut) */}
                                  <div className="mb-4 bg-slate-800 p-3 rounded text-xs text-slate-300 border border-slate-600 text-left shadow-inner">
                                      {soloTab === 'facile' && <div><span className="text-green-400 font-bold">🟢 {t('facile')} :</span> {t('tab_easy_desc')}</div>}
                                      {soloTab === 'moyen' && <div><span className="text-yellow-400 font-bold">🟡 {t('moyen')} :</span> {t('tab_med_desc')}</div>}
                                      {soloTab === 'difficile' && <div><span className="text-red-400 font-bold">🔴 {t('difficile')} :</span> {t('tab_hard_desc')}</div>}
                                  </div>

                                  {/* LEVEL GRID */}
                                  <div className="flex-1 overflow-y-auto no-scrollbar mb-4">
                                      <div className="grid grid-cols-5 gap-2">
                                          {Array.from({length: 25}, (_, i) => {
                                              const lvl = i + 1 + (soloTab === 'facile' ? 0 : soloTab === 'moyen' ? 25 : 50);
                                              const colorClass = soloTab === 'facile' ? 'bg-green-900 border-green-700 hover:bg-green-600' :
                                                                 soloTab === 'moyen' ? 'bg-yellow-800 border-yellow-600 hover:bg-yellow-500' :
                                                                 'bg-red-900 border-red-700 hover:bg-red-600';
                                              return (
                                                  <button key={lvl} onClick={() => startSoloGame(lvl)} className={`${colorClass} text-white font-bold py-3 rounded border shadow transition text-sm flex items-center justify-center`}>
                                                      {lvl}
                                                  </button>
                                              )
                                          })}
                                      </div>
                                  </div>
                                  
                                  <div className="flex flex-col gap-2">
                                      <div className="flex gap-2">
                                          <button onClick={() => setShowSoloRules(true)} className="w-1/2 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded text-xs font-bold border border-slate-500">{t('rules_solo')}</button>
                                          <button onClick={() => setLobbyMode('solo_leaderboard')} className="w-1/2 bg-blue-800 hover:bg-blue-700 text-white py-2 rounded text-xs font-bold border border-blue-600">{t('scores')}</button>
                                      </div>
                                  </div>
                              </div>
                          )}

                          {lobbyMode === 'solo_leaderboard' && (
                              <div className="flex flex-col h-full w-full relative">
                                  <button onClick={() => setLobbyMode('solo_menu')} className="absolute -top-2 -right-2 text-slate-400 hover:text-white font-bold text-xl leading-none">&times;</button>
                                  <h2 className="text-xl font-bold text-blue-400 mb-4 tracking-widest text-center">{t('scores')}</h2>
                                  
                                  <div className="flex justify-center gap-2 mb-4">
                                      <button onClick={() => setSoloTab('facile')} className={`px-3 py-1.5 font-bold rounded text-xs ${soloTab === 'facile' ? 'bg-green-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{t('facile')}</button>
                                      <button onClick={() => setSoloTab('moyen')} className={`px-3 py-1.5 font-bold rounded text-xs ${soloTab === 'moyen' ? 'bg-yellow-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{t('moyen')}</button>
                                      <button onClick={() => setSoloTab('difficile')} className={`px-3 py-1.5 font-bold rounded text-xs ${soloTab === 'difficile' ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{t('difficile')}</button>
                                  </div>

                                  <div className="flex-1 overflow-y-auto no-scrollbar mb-4">
                                      <div className="grid grid-cols-5 gap-2">
                                           {Array.from({length: 25}, (_, i) => {
                                              const lvl = i + 1 + (soloTab === 'facile' ? 0 : soloTab === 'moyen' ? 25 : 50);
                                              const colorClass = soloTab === 'facile' ? 'bg-green-900 border-green-700 hover:bg-green-800' : soloTab === 'moyen' ? 'bg-yellow-800 border-yellow-600 hover:bg-yellow-700' : 'bg-red-900 border-red-700 hover:bg-red-800';
                                              return (
                                                  <button key={lvl} onClick={() => openLeaderboard(lvl)} className={`${colorClass} hover:opacity-75 text-slate-200 font-bold py-2 rounded text-xs border transition shadow`}>{lvl}</button>
                                              )
                                           })}
                                      </div>
                                  </div>
                                  <div className="text-sm text-slate-400 italic mb-4 text-center">{t('click_to_view')}</div>
                                  <button onClick={() => setLobbyMode('solo_menu')} className="w-full bg-slate-800 text-slate-300 py-3 rounded text-sm font-bold border border-slate-600 hover:bg-slate-700 transition">{t('back')}</button>
                              </div>
                          )}

                          {/* Autres Modes */}
                          {lobbyMode === 'online' && (
                              <div className="space-y-4">
                                  <button onClick={createRoom} className="w-full font-bold py-3 px-4 rounded shadow-lg text-sm bg-emerald-700 hover:bg-emerald-600 text-white">{t('create_room')}</button>
                                  <div className="flex gap-2">
                                      <input type="text" value={joinCodeInput} onChange={(e) => setJoinCodeInput(e.target.value.toUpperCase())} placeholder="CODE" className="w-2/3 bg-slate-800 border border-slate-600 rounded px-2 text-center font-bold text-white focus:outline-none" maxLength={5} />
                                      <button onClick={joinExistingRoom} className="w-1/3 font-bold py-2 rounded shadow-lg text-sm bg-blue-700 text-white">{t('join')}</button>
                                  </div>
                                  <button onClick={() => setLobbyMode('menu')} className="w-full bg-slate-800 text-slate-400 py-2 rounded text-xs">{t('back')}</button>
                              </div>
                          )}

                          {lobbyMode === 'ai' && (
                              <div className="space-y-4">
                                  <button onClick={() => { setAiDifficulty('facile'); startLocalGame(true); }} className="w-full bg-green-700 text-white font-bold py-3 rounded">{t('facile')}</button>
                                  <button onClick={() => { setAiDifficulty('moyen'); startLocalGame(true); }} className="w-full bg-yellow-600 text-white font-bold py-3 rounded">{t('moyen')}</button>
                                  <button onClick={() => { setAiDifficulty('difficile'); startLocalGame(true); }} className="w-full bg-red-700 text-white font-bold py-3 rounded">{t('difficile')}</button>
                                  <button onClick={() => setLobbyMode('menu')} className="w-full bg-slate-800 text-slate-400 py-2 rounded text-xs">{t('back')}</button>
                              </div>
                          )}
                      </div>
                  </div>
              )}

              {/* LEADERBOARD VIEW MODAL */}
              {showLeaderboard && leaderboardData && (
                  <div className="fixed inset-0 bg-black/95 z-[120] flex items-center justify-center p-4">
                      <div className="bg-slate-900 border-2 border-blue-500 rounded-xl p-6 w-full max-w-md shadow-[0_0_30px_rgba(59,130,246,0.3)] relative">
                          <button onClick={() => setShowLeaderboard(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white font-bold text-xl leading-none">&times;</button>
                          
                          <h2 className="text-2xl font-bold text-white mb-4 text-center">TOP 10 - NIVEAU {leaderboardData.levelId}</h2>
                          <div className="space-y-2 mb-6 max-h-[50vh] overflow-y-auto pr-2 no-scrollbar">
                              {leaderboardData.scores.length === 0 ? (
                                  <p className="text-slate-400 text-center italic py-4">Aucun record pour ce niveau. Soyez le premier !</p>
                              ) : (
                                  leaderboardData.scores.map((s, i) => (
                                      <div key={i} className="flex justify-between items-center bg-slate-800 p-2 rounded border border-slate-700">
                                          <div className="flex items-center gap-3">
                                              <span className={`font-black ${i===0?'text-yellow-400 text-lg':i===1?'text-slate-300':i===2?'text-amber-600':'text-slate-500'}`}>#{i+1}</span>
                                              <span className="font-bold text-white uppercase tracking-wider">{s.name}</span>
                                          </div>
                                          <div className="font-mono text-orange-400 font-bold bg-black px-2 py-1 rounded">{s.pg} PG</div>
                                      </div>
                                  ))
                              )}
                          </div>
                          <button onClick={() => setShowLeaderboard(false)} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 rounded">{t('close')}</button>
                      </div>
                  </div>
              )}

              {/* =========================================
                  JEU PRINCIPAL (HUD DYNAMIQUE SOLO/MULTI)
              ============================================= */}
              {G && (
                <div className="h-full w-full flex flex-col p-1 sm:p-2 gap-1.5 relative">
                  
                  {/* 1. HEADER */}
                  <div className="flex-none flex justify-between items-start bg-slate-900 p-1 md:p-2 rounded border border-slate-800 shadow-md">
                    
                    <div className="flex flex-col w-[30%]">
                        {G.gameMode === 'solo' ? (
                            <div className="w-full text-[clamp(10px,1.5vh,16px)] font-black px-1 py-1 rounded text-center leading-none bg-orange-900/50 text-orange-400 border border-orange-700">{t('level')} {G.levelId}</div>
                        ) : (
                            <div className={`w-full text-[clamp(10px,1.5vh,16px)] font-bold px-1 py-0.5 rounded text-center leading-none ${G.currentPlayer === 0 || tutorialState ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-500'}`}>J1: {G.players[0].score} PF</div>
                        )}
                    </div>
                    
                    <div className="flex flex-col items-center justify-center flex-1 mt-0.5">
                      <div className="flex items-center gap-1 mb-0.5">
                         <button onClick={() => setShowMenuConfirm(true)} className="text-[10px] bg-slate-700 text-white px-2 py-0.5 rounded">🏠</button>
                         <button onClick={() => setShowNewGameConfirm(true)} disabled={!canInteract} className="text-[10px] bg-emerald-700 text-white px-2 py-0.5 rounded">🔄</button>
                         <button onClick={() => G.gameMode === 'solo' ? setShowSoloRules(true) : setShowRules(true)} className="text-[10px] bg-slate-700 text-blue-300 font-bold px-2 py-0.5 rounded">📖</button>
                      </div>
                      
                      {roomId && G.gameMode !== 'solo' && !tutorialState && (
                          <div className="flex items-center justify-center gap-2 mt-1 mb-1 w-full">
                              <span className="text-sm md:text-base text-orange-500 font-black bg-orange-950/50 px-3 py-1 rounded-l border border-orange-600 shadow-sm tracking-widest">{t('code')} {roomId}</span>
                              <button onClick={copyRoomCode} className="text-[10px] md:text-xs bg-orange-600 hover:bg-orange-500 text-white px-3 py-1.5 rounded-r font-bold shadow-sm transition h-full border border-orange-600">{t('copy')}</button>
                          </div>
                      )}
                      
                      <div className="flex items-center gap-1 mt-1">
                        {G.gameMode === 'solo' ? (
                            <span className="text-[clamp(10px,1.8vh,14px)] text-white font-black bg-black px-3 py-0.5 rounded border-2 border-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.5)]">{t('pg_used')} {G.pgUsed}</span>
                        ) : (
                            <span className="text-[10px] text-yellow-400 font-bold bg-black px-2 py-0.5 rounded border border-yellow-600">{t('pg')} {G.ap}/4</span>
                        )}
                        <button onClick={handleUndo} disabled={!G.history?.length || !canInteract || tutorialState} className="px-1.5 py-0.5 rounded border text-[10px] bg-slate-700 text-white">{t('undo')}</button>
                        {G.gameMode !== 'solo' && (
                            <button onClick={endTurn} disabled={!canInteract && !tutorialState} className={`px-2 py-0.5 rounded font-bold text-[10px] bg-red-700 text-white ${getTutoClass('PASS_BTN')}`}>{t('pass')}</button>
                        )}
                      </div>
                    </div>

                    <div className="flex flex-col w-[30%] items-end">
                        {G.gameMode === 'solo' ? (
                             <div className="w-full text-[clamp(9px,1.2vh,12px)] font-bold px-1 py-1 rounded text-center leading-none bg-slate-800 text-slate-400 border border-slate-700">{t('win_decks_solo')}</div>
                        ) : (
                             <div className={`w-full text-[clamp(10px,1.5vh,16px)] font-bold px-1 py-0.5 rounded text-center leading-none ${G.currentPlayer === 1 && !tutorialState ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-500'}`}>{tutorialState ? 'TUTO' : `J2: ${G.players[1].score} PF`}</div>
                        )}
                    </div>
                  </div>

                  <div className="flex-none bg-black px-2 py-1 text-center text-emerald-400 border border-slate-800 rounded text-[clamp(10px,1.8vh,16px)] font-semibold shadow-inner truncate leading-tight">
                    {G.message} {localMsg && <span className="text-red-400 ml-2">{localMsg}</span>}
                  </div>

                  {/* 2. PLANS (Grues) */}
                  <div className="flex-[2.2] min-h-0 flex flex-row justify-between gap-1.5 md:gap-3 w-full">
                    {G.cranes.map((crane, idx) => {
                      const isDone = crane.phase === 'done'; 
                      const reqBlock = getCurrentRequirement(crane);
                      
                      return (
                        <div key={crane.id} onClick={() => handleCraneClick(idx)} className={`p-1.5 md:p-2 rounded-xl border-2 flex-1 min-w-0 flex flex-col gap-1.5 md:gap-2 ${isDone ? 'bg-slate-950 border-emerald-900 opacity-70' : 'bg-slate-800 border-slate-600 hover:border-slate-400 cursor-pointer shadow-xl'} transition-colors ${getTutoClass('CRANE_'+idx)}`}>
                          
                          <div className="flex justify-between items-center z-10 border-b border-white/10 pb-1 flex-none pointer-events-none shrink-0">
                              <span className="font-black text-[11px] md:text-[14px] text-white truncate tracking-wider">{t('crane')} {crane.id}</span>
                              <div className="w-[26px] md:w-[36px] aspect-square flex-none shrink-0">
                                 {!isDone && reqBlock && <BlockTile blockId={reqBlock} isAccessible={false} isSelected={false} status="normal" isMini={true} t={t} />}
                              </div>
                          </div>
                          
                          {!isDone ? (
                            <div className="flex-1 min-h-0 flex flex-col gap-1.5 justify-center pointer-events-none">
                                <MiniMap layoutData={crane.deckData} progress={crane.phase === 'deck' ? crane.progress : 0} type="deck" isActive={crane.phase === 'deck'} name={t('deck')} t={t} />
                                <MiniMap layoutData={crane.bayData} progress={crane.phase === 'bay' ? crane.progress : crane.bayData.total} type="bay" isActive={crane.phase === 'bay'} name={t('bay')} t={t} />
                            </div>
                          ) : (
                            <div className="flex-1 flex items-center justify-center text-emerald-600 font-black text-lg md:text-2xl pointer-events-none tracking-widest drop-shadow-md">{t('sealed')}</div>
                          )}
                          
                        </div>
                      );
                    })}
                  </div>

                  {/* 3. FLOTTE (Machines Globales) */}
                  <div className="flex-none bg-slate-900 border border-slate-700 rounded-lg p-1.5 flex items-center justify-between shadow-md">
                      <div className="flex gap-2 w-full justify-around h-[5vh] max-h-[40px] min-h-[30px]">
                          <div onClick={() => handleMachineSelect('S', 0)} className={`flex items-center gap-1 w-1/4 max-w-[100px] rounded ${getTutoClass('FLEET_S0')}`}>
                              <div className="h-full aspect-square shrink-0 pointer-events-none">{renderMachineToken('S', 0, selected?.type==='machine' && selected.id===0)}</div>
                              <span className="text-[clamp(9px,1.4vh,12px)] text-slate-500 hidden sm:block truncate pointer-events-none">{G.stackers[0]===null ? t('spello') : `P${G.stackers[0]+1}`}</span>
                          </div>
                          <div onClick={() => handleMachineSelect('S', 1)} className={`flex items-center gap-1 w-1/4 max-w-[100px] rounded ${getTutoClass('FLEET_S1')}`}>
                              <div className="h-full aspect-square shrink-0 pointer-events-none">{renderMachineToken('S', 1, selected?.type==='machine' && selected.id===1)}</div>
                              <span className="text-[clamp(9px,1.4vh,12px)] text-slate-500 hidden sm:block truncate pointer-events-none">{G.stackers[1]===null ? t('spello') : `P${G.stackers[1]+1}`}</span>
                          </div>
                          <div onClick={() => handleMachineSelect('T', 'T')} className={`flex items-center gap-1 w-1/4 max-w-[100px] rounded ${getTutoClass('FLEET_T')}`}>
                              <div className="h-full aspect-square shrink-0 pointer-events-none">{renderMachineToken('T', null, selected?.type==='machine' && selected.id==='T')}</div>
                          </div>
                          <div className="border-l border-slate-700 pl-2 flex items-center justify-center flex-1">
                              <button onClick={() => handleVoluntarySpelo(selected?.type==='machine' && selected.id !== 'T' ? selected.id : 0)} className="flex flex-col items-center justify-center bg-slate-800 border border-slate-600 rounded px-2 h-full w-full max-w-[100px]">
                                  <span className="text-[clamp(8px,1.4vh,12px)] font-bold text-slate-300 leading-none">{t('spello')}</span>
                                  <span className="text-[clamp(6px,1vh,9px)] text-slate-500 leading-none">(2 PG)</span>
                              </button>
                          </div>
                      </div>
                  </div>

                  {/* 4. NAVIGATEUR */}
                  <div className="flex-[0.5] w-full bg-black/50 border border-slate-800 rounded-lg p-1.5 flex flex-col justify-center">
                      <div className="flex w-full justify-between items-end gap-[2px] sm:gap-1 h-full max-h-[80px]">
                          {G.cour.map((pile, pIdx) => {
                              const isT = G.transtainer === pIdx;
                              const isTAura = Math.abs(G.transtainer - pIdx) <= 1;
                              const isS1 = G.stackers[0] === pIdx;
                              const isS2 = G.stackers[1] === pIdx;
                              const isActiveView = activePileIdx === pIdx;
                              let isValidShiftTarget = false;
                              if (selected?.type === 'block' && selected.machine === 'S') isValidShiftTarget = Math.abs(selected.pile - pIdx) === 1;

                              return (
                                  <div key={pIdx} onClick={() => handlePileNavigatorClick(pIdx)} 
                                       className={`relative flex flex-col items-center flex-1 rounded bg-slate-900 h-full justify-end pb-1 border-t-2 border-b-2
                                          ${isActiveView ? 'border-white bg-slate-800 scale-105 z-10 shadow-[0_0_10px_rgba(255,255,255,0.2)]' : 'border-slate-800'}
                                          ${isTAura && !isActiveView ? 'border-t-red-900 bg-red-950/20' : ''}
                                          ${isValidShiftTarget ? 'border-yellow-400 bg-yellow-900/30 animate-pulse' : ''}
                                          ${getTutoClass('NAV_'+pIdx)}
                                       `}
                                  >
                                      <div className="absolute top-1 w-full flex justify-center pointer-events-none">
                                          {isT && <div className="w-[35%] max-w-[12px] aspect-square bg-yellow-500 rounded-[2px] shadow-sm z-20"></div>}
                                      </div>
                                      <div className="absolute left-[5%] top-1/2 transform -translate-y-1/2 flex flex-col gap-[2px] w-[25%] max-w-[8px] z-20 pointer-events-none">
                                          {isS1 && <div className="w-full aspect-square bg-blue-600 rounded-full shadow-sm border border-white/50"></div>}
                                          {isS2 && <div className="w-full aspect-square bg-red-600 rounded-full shadow-sm border border-white/50"></div>}
                                      </div>
                                      <div className="flex gap-[1px] items-end justify-center w-full h-[55%] px-[2px] z-10 pointer-events-none">
                                          {pile.map((col, cIdx) => (
                                              <div key={cIdx} className="flex flex-col-reverse justify-start gap-[1px] w-1/4 max-w-[8px] h-full">
                                                  {col.map((bId, bIdx) => (
                                                      <div key={bIdx} className="w-full h-[30%] rounded-[1px]" style={{background: bId === 'HAZ' ? '#f97316' : BLOCK_TYPES[bId].style.backgroundColor}}></div>
                                                  ))}
                                              </div>
                                          ))}
                                      </div>
                                      <span className="text-[clamp(7px,1.2vh,10px)] font-bold text-slate-400 mt-0.5 leading-none pointer-events-none">P{pIdx+1}</span>
                                  </div>
                              );
                          })}
                      </div>
                  </div>

                  {/* 5. VUE DÉTAILLÉE */}
                  <div className="flex-[1.2] min-h-0 w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-2 shadow-inner flex flex-col items-center relative overflow-hidden">
                      <button onClick={() => setActivePileIdx(prev => prev > 0 ? prev - 1 : 9)} className="absolute left-0 top-0 bottom-0 w-[10%] max-w-[40px] text-slate-500 hover:text-white flex items-center justify-center font-bold text-2xl bg-gradient-to-r from-black/30 to-transparent z-10">&lt;</button>
                      <button onClick={() => setActivePileIdx(prev => prev < 9 ? prev + 1 : 0)} className="absolute right-0 top-0 bottom-0 w-[10%] max-w-[40px] text-slate-500 hover:text-white flex items-center justify-center font-bold text-2xl bg-gradient-to-l from-black/30 to-transparent z-10">&gt;</button>

                      <h3 className="flex-none text-[clamp(12px,2vh,18px)] font-bold text-white mb-2 tracking-widest uppercase border-b border-slate-600 pb-1 leading-none">{t('focus')} {activePileIdx + 1}</h3>
                      {Math.abs(G.transtainer - activePileIdx) <= 1 && (<div className="absolute top-0 left-12 right-12 h-1.5 bg-red-900/50 rounded-b-lg"></div>)}

                      <div className="flex-1 min-h-0 flex items-end justify-center gap-2 sm:gap-4 w-full pb-2">
                          <div className="text-[clamp(8px,1.5vh,12px)] text-slate-500 -rotate-90 origin-bottom-left uppercase tracking-widest mb-4 flex-none">{t('front')}</div>
                          
                          <div className={`w-[15vw] max-w-[70px] h-[65%] flex flex-col justify-end items-center pb-2 rounded border-b-4 bg-slate-800 cursor-pointer ${Math.abs(G.transtainer - activePileIdx) <= 1 ? 'border-red-700 bg-red-950/30' : 'border-slate-500'}`} onClick={() => handleParkingClick(activePileIdx)}>
                              {G.transtainer === activePileIdx && <div className={`h-[45%] w-auto max-h-[50px] aspect-square mb-1.5 rounded shrink-0 ${getTutoClass('PARKING_T', activePileIdx)}`} onClick={(e) => { e.stopPropagation(); handleMachineSelect('T', 'T'); }}>{renderMachineToken('T', null, selected?.type==='machine' && selected.id==='T')}</div>}
                              {G.stackers[0] === activePileIdx && <div className="h-[45%] w-auto max-h-[50px] aspect-square mb-1.5 shrink-0" onClick={(e) => { e.stopPropagation(); handleMachineSelect('S', 0); }}>{renderMachineToken('S', 0, selected?.type==='machine' && selected.id===0)}</div>}
                              {G.stackers[1] === activePileIdx && <div className="h-[45%] w-auto max-h-[50px] aspect-square mb-1.5 shrink-0" onClick={(e) => { e.stopPropagation(); handleMachineSelect('S', 1); }}>{renderMachineToken('S', 1, selected?.type==='machine' && selected.id===1)}</div>}
                              {G.stackers[0] !== activePileIdx && G.stackers[1] !== activePileIdx && G.transtainer !== activePileIdx && <span className="text-[clamp(8px,1.5vh,12px)] text-slate-500 pointer-events-none">PARK</span>}
                          </div>

                          <div className="flex gap-1.5 sm:gap-2 h-full items-end">
                              {G.cour[activePileIdx].map((col, cIdx) => {
                                  const isT_Here = G.transtainer === activePileIdx;
                                  const hasS0 = (G.stackers[0] === activePileIdx) && (G.gameMode === 'solo' || G.currentPlayer === 0 || tutorialState);
                                  const hasS1 = (G.stackers[1] === activePileIdx) && (G.gameMode === 'solo' || G.currentPlayer === 1 || tutorialState);
                                  const isS_Here = hasS0 || hasS1;
                                  const firstAvailCol = getFirstAvailCol(G.cour[activePileIdx]);

                                  return (
                                      <div key={cIdx} onClick={() => handleColClickDetail(cIdx)} className={`w-[12vw] max-w-[65px] h-[90%] bg-slate-950/80 rounded flex flex-col-reverse justify-start items-center p-1 border-x border-t border-slate-700 transition ${selected?.type === 'block' && selected.pile === activePileIdx && selected.col === cIdx ? 'bg-yellow-400/20 border-yellow-400' : col.length >= 3 ? 'border-b-4 border-b-slate-950' : 'border-b border-b-slate-700'} ${getTutoClass('DETAIL_COL_' + cIdx, activePileIdx)}`}>
                                          {col.map((blockId, bIdx) => {
                                              const isTopBlock = bIdx === col.length - 1;
                                              let isAccessible = false;
                                              if (isTopBlock && canInteract) {
                                                  if (isT_Here) isAccessible = true; 
                                                  if (isS_Here && cIdx === firstAvailCol) isAccessible = true;
                                              }

                                              return (
                                                  <div key={bIdx} className="h-[31%] w-auto max-h-[60px] aspect-square mb-1 shrink-0 pointer-events-none">
                                                        <BlockTile blockId={blockId} isSelected={isTopBlock && selected?.type === 'block' && selected.pile === activePileIdx && selected.col === cIdx} isAccessible={isAccessible} status="normal" t={t} />
                                                  </div>
                                              );
                                          })}
                                          {/* Helper Visuel Shift Transtainer */}
                                          {selected?.type === 'block' && selected.machine === 'T' && selected.pile === activePileIdx && col.length < 3 && (
                                              <div className={`h-[31%] w-auto max-h-[60px] aspect-square shrink-0 border border-dashed border-yellow-400/50 rounded mt-1 flex items-center justify-center bg-yellow-400/10 ${getTutoClass('DETAIL_SHIFT_' + cIdx, activePileIdx)}`}>
                                                  <span className="text-[clamp(10px,2vh,16px)] text-yellow-200 pointer-events-none">⬇️</span>
                                              </div>
                                          )}
                                      </div>
                                  )
                              })}
                          </div>
                          <div className="text-[clamp(8px,1.5vh,12px)] text-slate-500 uppercase tracking-widest mb-4 flex-none">{t('back_p')}</div>
                      </div>
                  </div>

                  {/* BULLE TUTORIEL */}
                  {tutorialState && tutorialState.active && currentStepData && (
                    tutorialState.minimized ? (
                      <button onClick={() => setTutorialState(prev => ({...prev, minimized: false}))} className="absolute top-24 right-4 bg-emerald-600 border-2 border-white text-white px-4 py-2 rounded-full font-bold shadow-lg z-[100] animate-pulse">
                          [+] {t('show_tuto')} ({tutorialState.step})
                      </button>
                    ) : currentStepData.type === 'ai_turn' || currentStepData.type === 'info' ? (
                        <div className="absolute inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
                            <div className="bg-slate-900 border-4 border-emerald-400 p-8 rounded-2xl shadow-[0_0_50px_rgba(16,185,129,0.5)] max-w-xl w-full text-center flex flex-col items-center">
                                <div className="text-5xl mb-4">🎓</div>
                                <h3 className="text-emerald-400 font-black text-2xl mb-4 tracking-widest uppercase">{currentStepData.title}</h3>
                                <p className="text-white text-lg mb-8 leading-relaxed">{currentStepData.text}</p>
                                <button 
                                    onClick={() => {
                                        if (currentStepData.type === 'ai_turn' && currentStepData.execute) { mutateG(currentStepData.execute); }
                                        if (currentStepData.action === 'end') { returnToMenu(); } else { setTutorialState(prev => ({...prev, step: prev.step + 1})); }
                                    }}
                                    className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-8 rounded-lg text-xl shadow-lg transition transform hover:scale-105"
                                >
                                    {currentStepData.action === 'end' ? t('finish') : t('continue')}
                                </button>
                            </div>
                        </div>
                    ) : (
                      <div className="absolute top-[18vh] left-1/2 transform -translate-x-1/2 bg-slate-900 border-2 border-emerald-400 p-4 rounded-xl shadow-[0_0_30px_rgba(16,185,129,0.8)] z-[100] w-11/12 max-w-lg text-center flex flex-col items-center">
                          <div className="flex justify-between items-center w-full mb-2 border-b border-slate-700 pb-1">
                              <h3 className="text-emerald-300 font-black text-xs tracking-widest uppercase">Étape {tutorialState.step} / {getTutorialSteps(t).length - 1}</h3>
                              <button onClick={() => setTutorialState(prev => ({...prev, minimized: true}))} className="text-slate-400 hover:text-white font-bold px-2 py-1 bg-slate-800 rounded text-xs border border-slate-600">[-] {t('hide')}</button>
                          </div>
                          <p className="text-white text-sm md:text-base font-bold leading-snug mb-3">{currentStepData.text}</p>
                          <button onClick={resetTutorialSelection} className="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-4 py-1.5 rounded text-xs font-bold transition shadow-md flex items-center justify-center gap-2 mx-auto">
                              <span>↻</span> {t('restart_step')}
                          </button>
                      </div>
                    )
                  )}

              </div>
              )}

              {/* MODAL LEADERBOARD SUBMIT (Fin de Partie Solo) */}
              {qualifiesForLeaderboard && G?.gameMode === 'solo' && (
                  <div className="fixed inset-0 bg-black/95 z-[130] flex items-center justify-center p-4">
                      <div className="bg-slate-900 border-2 border-orange-500 rounded-xl p-8 max-w-md w-full text-center shadow-[0_0_50px_rgba(249,115,22,0.4)]">
                          <h2 className="text-3xl font-black text-orange-500 mb-2 uppercase">TERMINÉ !</h2>
                          <p className="text-white text-lg mb-6">Vous avez utilisé <strong className="text-yellow-400 text-2xl">{G.pgUsed} PG</strong>.</p>
                          <p className="text-emerald-400 font-bold mb-4 animate-pulse">NOUVEAU RECORD TOP 10 !</p>
                          <input 
                              type="text" 
                              maxLength={12} 
                              placeholder="ENTREZ VOTRE NOM" 
                              value={playerNameInput}
                              onChange={(e) => setPlayerNameInput(e.target.value.toUpperCase())}
                              className="w-full bg-slate-800 text-white border-2 border-slate-600 rounded p-3 text-center text-xl font-bold mb-6 uppercase focus:border-orange-500 outline-none"
                          />
                          <button 
                              onClick={submitSoloScore} 
                              disabled={!playerNameInput.trim()}
                              className={`w-full font-bold py-3 rounded text-lg ${playerNameInput.trim() ? 'bg-orange-600 hover:bg-orange-500 text-white' : 'bg-slate-700 text-slate-500'}`}
                          >
                              ENREGISTRER
                          </button>
                          <button onClick={() => setQualifiesForLeaderboard(false)} className="w-full mt-4 text-slate-400 underline text-sm">Passer (Ne pas sauvegarder)</button>
                      </div>
                  </div>
              )}

              {/* RÈGLES STANDARDS MULTI */}
              {showRules && (
                <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300">
                    <button onClick={() => setShowRules(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">{t('close')}</button>
                    <h2 className="text-2xl font-bold text-blue-400 mb-4 border-b border-slate-700 pb-2">📖 RÈGLES DE NAVIGATION (MULTI)</h2>
                    <ul className="space-y-4 mb-4">
                        <li><strong className="text-yellow-400">FLOTTE (Haut) :</strong> Sélectionnez votre machine (S ou T).</li>
                        <li><strong className="text-emerald-400">NAVIGATEUR (Milieu) :</strong> Cliquez sur une pile pour y déplacer la machine sélectionnée.</li>
                        <li><strong className="text-blue-400">VUE DÉTAILLÉE (Bas) :</strong> Cliquez sur les conteneurs entourés de <span className="text-cyan-400 font-bold">cyan</span> pour les extraire.</li>
                    </ul>
                    <p className="mb-4 bg-slate-800 p-3 rounded"><strong className="text-white">COÛTS :</strong> Vous avez 4 PG par tour. Bouger coûte 1 PG. Extraire et Poser coûte 1 PG.</p>
                    <p className="text-red-400 font-bold border-l-4 border-red-500 pl-3">ZONE DE SÉCURITÉ DU TRANSTAINER : La pile où se trouve le T et ses 2 voisines sont interdites aux Stackers (Expulsion en Spello !)</p>
                  </div>
                </div>
              )}

              {/* RÈGLES SOLO */}
              {showSoloRules && (
                <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-orange-500 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300">
                    <button onClick={() => setShowSoloRules(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">{t('close')}</button>
                    <h2 className="text-2xl font-bold text-orange-400 mb-4 border-b border-orange-800 pb-2">📦 LE TEST À BRETELLES</h2>
                    <p className="mb-4 text-white">Ce mode est un puzzle d'optimisation pure. Il n'y a plus de tours ni d'adversaires.</p>
                    <ul className="space-y-4 mb-4 list-disc pl-5">
                        <li><strong className="text-orange-400">Objectif :</strong> Terminer les 3 Decks en utilisant le <strong>moins de PG possible</strong>.</li>
                        <li><strong className="text-emerald-400">Contrôle Total :</strong> Vous pilotez S1 (Bleu), S2 (Rouge) ET le Transtainer (Jaune).</li>
                        <li><strong className="text-blue-400">L'Équité :</strong> Chaque "Niveau" génère toujours exactement la même disposition de départ pour tous les joueurs au monde.</li>
                        <li><strong className="text-yellow-400">Le Spello-Trick :</strong> Utilisez le Transtainer ou un Stacker pour écraser votre autre Stacker et l'envoyer en Spello. Sa prochaine sortie coûte 0 PG !</li>
                    </ul>
                  </div>
                </div>
              )}

              {/* DEVLOG MODAL */}
              {showDevlog && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-2xl w-full max-h-[90dvh] overflow-y-auto p-6 shadow-2xl relative text-[clamp(12px,1.8vh,16px)] text-slate-300 text-left">
                      <button onClick={() => setShowDevlog(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1.5 px-3 rounded text-sm">{t('close')}</button>
                      <h2 className="text-2xl font-bold text-emerald-400 mb-6 border-b border-slate-700 pb-2 font-sans tracking-widest uppercase">{t('devlog_title')}</h2>
                      <div className="space-y-6">
                          <div>
                              <h3 className="text-lg font-bold text-white flex items-center gap-2"><span className="bg-emerald-600 text-white px-2 py-0.5 rounded text-xs">V2.31</span> Optimisation & Ergonomie</h3>
                              <p className="text-xs text-slate-400 mt-1">Mars 2026</p>
                              <ul className="list-disc pl-5 mt-1 text-sm space-y-1 text-slate-400">
                                  <li>Renommage de la campagne solo en "Le Test à Bretelles".</li>
                                  <li>Clarification visuelle des règles spécifiques à chaque niveau de difficulté dans le menu.</li>
                              </ul>
                          </div>
                          <div>
                              <h3 className="text-lg font-bold text-white flex items-center gap-2"><span className="bg-blue-600 text-white px-2 py-0.5 rounded text-xs">V2.25</span> Release Candidate</h3>
                              <p className="text-xs text-slate-400 mt-1">Mars 2026</p>
                              <ul className="list-disc pl-5 mt-1 text-sm space-y-1 text-slate-400">
                                  <li>Refonte totale des ponts (Decks) : suppression des structures instables.</li>
                                  <li>Filtre dynamique du Leaderboard par difficulté (25 niveaux).</li>
                                  <li>Historique d'annulation (Undo) étendu à 50 tours.</li>
                                  <li>Ajout du formulaire de Feedback direct et des Mentions légales.</li>
                              </ul>
                          </div>
                          <div>
                              <h3 className="text-lg font-bold text-white flex items-center gap-2"><span className="bg-blue-600 text-white px-2 py-0.5 rounded text-xs">V2.0</span> Le Port 3D</h3>
                              <p className="text-xs text-slate-400 mt-1">Février 2026</p>
                              <ul className="list-disc pl-5 mt-1 text-sm space-y-1 text-slate-400">
                                  <li>Introduction de la machinerie lourde (Transtainer & Stackers).</li>
                                  <li>Ajout de la Zone Spello et de la mécanique d'expulsion tactique.</li>
                                  <li>Mise en place de l'Aura de sécurité.</li>
                              </ul>
                          </div>
                          <div className="border-t border-slate-700 pt-4 mt-4">
                              <p className="text-sm text-yellow-400 font-bold">⏱️ Temps de développement cumulé : ~155 heures</p>
                              <p className="text-xs text-slate-400 mt-1 italic">Conception, Game Design, Algorithmique, UI/UX, équilibrage et playtests intensifs.</p>
                          </div>
                      </div>
                    </div>
                  </div>
              )}

              {/* NOUVEAU : MODALE FEEDBACK PRO */}
              {showFeedback && (
                  <div className="fixed inset-0 bg-black/95 z-[120] flex items-center justify-center p-4">
                      <div className="bg-slate-900 border-2 border-cyan-500 rounded-xl p-6 w-full max-w-md shadow-[0_0_30px_rgba(6,182,212,0.3)] relative">
                          <button onClick={() => {setShowFeedback(false); setFeedbackStatus('');}} className="absolute top-4 right-4 text-slate-400 hover:text-white font-bold text-xl leading-none">&times;</button>
                          
                          <h2 className="text-2xl font-bold text-cyan-400 mb-2 text-center uppercase tracking-widest">{t('feedback_title')}</h2>
                          <p className="text-slate-300 text-sm mb-4 text-center">{t('feedback_desc')}</p>
                          
                          <textarea 
                              className="w-full h-32 bg-slate-800 text-white border border-slate-600 rounded p-3 text-sm focus:border-cyan-400 outline-none mb-4 resize-none"
                              placeholder={t('feedback_placeholder')}
                              value={feedbackText}
                              onChange={(e) => setFeedbackText(e.target.value)}
                              disabled={feedbackStatus === 'sending' || feedbackStatus === 'success'}
                          />
                          
                          {feedbackStatus === 'success' ? (
                              <div className="bg-green-900/50 border border-green-500 text-green-300 p-3 rounded text-center font-bold">
                                  {t('feedback_success')}
                              </div>
                          ) : (
                              <button 
                                  onClick={handleFeedbackSubmit} 
                                  disabled={!feedbackText.trim() || feedbackStatus === 'sending'}
                                  className={`w-full font-bold py-3 rounded text-sm transition ${!feedbackText.trim() ? 'bg-slate-800 text-slate-500 border border-slate-700' : 'bg-cyan-700 hover:bg-cyan-600 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]'}`}
                              >
                                  {feedbackStatus === 'sending' ? t('feedback_sending') : t('feedback_send')}
                              </button>
                          )}
                          
                          {feedbackStatus === 'error' && (
                              <div className="text-red-400 text-xs text-center mt-2">{t('feedback_error')}</div>
                          )}
                      </div>
                  </div>
              )}

              {/* MODALS CONFIRM */}
              {showNewGameConfirm && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl p-6 text-center text-slate-300 shadow-2xl">
                        <h2 className="text-xl font-bold text-emerald-400 mb-4">RESTART</h2>
                        <div className="flex justify-center gap-6 mt-4">
                            <button onClick={()=>setShowNewGameConfirm(false)} className="px-6 py-2 bg-slate-700 rounded font-bold">{t('cancel')}</button>
                            <button onClick={()=>{handleRestartGame();setShowNewGameConfirm(false);}} className="px-6 py-2 bg-emerald-700 text-white rounded font-bold">{t('confirm')}</button>
                        </div>
                    </div>
                  </div>
              )}

              {showMenuConfirm && (
                  <div className="fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
                    <div className="bg-slate-900 border-2 border-slate-700 rounded-xl p-6 text-center text-slate-300 shadow-2xl">
                        <h2 className="text-xl font-bold text-blue-400 mb-4">{t('back').toUpperCase()}</h2>
                        <div className="flex justify-center gap-6 mt-4">
                            <button onClick={()=>setShowMenuConfirm(false)} className="px-6 py-2 bg-slate-700 rounded font-bold">{t('cancel')}</button>
                            <button onClick={() => { setShowMenuConfirm(false); returnToMenu(); }} className="px-6 py-2 bg-blue-700 text-white rounded font-bold">{t('quit')}</button>
                        </div>
                    </div>
                  </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
