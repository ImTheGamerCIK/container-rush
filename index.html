<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Rush</title>
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React pour l'interface -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel pour lire le code JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const { useState, useEffect } = React;

        // ⚠️ ÉTAPE 2 : REMPLACEZ LA LIGNE CI-DESSOUS PAR VOTRE CODE FIREBASE ⚠️
        const firebaseConfig = {
  apiKey: "AIzaSyBkI615UzSjgiC8Kfih3Jh1p7DrOjisldg",
  authDomain: "container-rush.firebaseapp.com",
  projectId: "container-rush",
  storageBucket: "container-rush.firebasestorage.app",
  messagingSenderId: "792149875715",
  appId: "1:792149875715:web:6355d830c20a89f9a98236",
  measurementId: "G-5JM0CGG78B"
};
        
        // --- CONNEXION BASE DE DONNÉES ---
        const appId = 'container-rush-public';
        let app, auth, db;
        
        if (firebaseConfig) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // --- CONFIGURATION ET DONNÉES DU JEU ---
        const BLOCK_TYPES = {
          L:   { id: 'L',   label: 'L',   name: 'Léger',    style: { backgroundColor: '#f8fafc', color: '#0f172a', borderColor: '#cbd5e1' }, points: 1 },
          M:   { id: 'M',   label: 'M',   name: 'Moyen',    style: { backgroundColor: '#94a3b8', color: '#0f172a', borderColor: '#475569' }, points: 2 },
          H:   { id: 'H',   label: 'H',   name: 'Lourd',    style: { backgroundColor: '#1e293b', color: '#f8fafc', borderColor: '#000000' }, points: 1 },
          R:   { id: 'R',   label: 'R',   name: 'Reefer',   style: { backgroundColor: '#06b6d4', color: '#0f172a', borderColor: '#164e63' }, points: 3 },
          HAZ: { id: 'HAZ', label: 'HAZ', name: 'Hazard',   style: { background: 'repeating-linear-gradient(45deg, #f97316, #f97316 6px, #1e293b 6px, #1e293b 12px)', color: 'white', borderColor: '#f97316' }, points: 4 },
          TW:  { id: 'TW',  label: 'TW',  name: 'Twin',     style: { backgroundColor: '#22c55e', color: 'white', borderColor: '#14532d' }, points: 5 },
        };

        const BAYS_DATABASE = [
          { name: "B01: Standard", layout: [['L','L','L','L'], ['M','M','M'], ['H','M','H'], ['H','H']] },
          { name: "B02: Frigo Cale", layout: [['L','L','L','L'], ['M','R','M'], ['H','R','H'], ['H','H']] },
          { name: "B03: Noyau Toxique", layout: [['L','L','L','L'], ['M','M','M'], ['H','HAZ','H'], ['H','TW']] },
          { name: "B04: Base Lourde", layout: [['L','M','M','L'], ['M','M','M'], ['H','H','H'], ['H','H']] },
          { name: "B05: Cale Mixte", layout: [['L','M','M','L'], ['M','HAZ','M'], ['H','R','H'], ['H','TW']] }
        ];

        const DECKS_DATABASE = [
          { name: "D01: Pyramide", layout: [[null, null, 'L', null, null], [null, 'M', 'M', 'M', null], ['H', 'R', 'M', 'R', 'H'], ['H', 'H', 'TW', 'H', 'H']] },
          { name: "D02: Deux Tours", layout: [['L', null, null, null, 'L'], ['M', null, 'M', null, 'M'], ['M', 'M', 'HAZ', 'M', 'M'], ['H', 'H', 'TW', 'H', 'H']] },
          { name: "D03: Plateau Plat", layout: [[null, 'L', 'L', 'L', null], [null, 'M', 'M', 'M', null], ['M', 'R', 'M', 'R', 'M'], ['H', 'H', 'H', 'H', 'H']] },
          { name: "D04: Le Bastion", layout: [[null, null, null, null, null], [null, 'L', 'L', 'L', null], ['M', 'R', 'H', 'R', 'M'], ['H', 'H', 'TW', 'H', 'H']] },
          { name: "D05: Bloc HAZ", layout: [[null, null, 'L', null, null], [null, 'L', 'HAZ', 'L', null], ['M', 'M', 'M', 'M', 'M'], ['H', 'H', 'TW', 'H', 'H']] }
        ];

        const enrichLayout = (layout) => {
          let currentIndex = 0;
          const enriched = layout.map(row => row.map(() => null));
          for (let r = layout.length - 1; r >= 0; r--) {
            for (let c = 0; c < layout[r].length; c++) {
              if (layout[r][c] !== null) {
                enriched[r][c] = { type: layout[r][c], linearIndex: currentIndex };
                currentIndex++;
              }
            }
          }
          return { enriched, total: currentIndex };
        };

        const generateInitialCour = () => {
          const pool = [
            ...Array(24).fill('L'), ...Array(36).fill('M'), ...Array(36).fill('H'),
            ...Array(12).fill('R'), ...Array(6).fill('HAZ'), ...Array(6).fill('TW'),
          ];
          for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
          }
          const cour = [];
          let index = 0;
          for (let p = 0; p < 10; p++) {
            const pile = [];
            for (let c = 0; c < 4; c++) {
              const col = [];
              for (let b = 0; b < 3; b++) { col.push(pool[index]); index++; }
              pile.push(col);
            }
            cour.push(pile);
          }
          return cour;
        };

        const getRandomCranes = () => {
          const shuffledBays = [...BAYS_DATABASE].sort(() => 0.5 - Math.random());
          const shuffledDecks = [...DECKS_DATABASE].sort(() => 0.5 - Math.random());
          const cranes = [];
          for (let i = 0; i < 3; i++) {
              cranes.push({
                  id: i + 1,
                  name: `GRUE ${i + 1}`,
                  bayName: shuffledBays[i].name,
                  deckName: shuffledDecks[i].name,
                  bayData: enrichLayout(shuffledBays[i].layout),
                  deckData: enrichLayout(shuffledDecks[i].layout),
                  phase: 'bay',
                  progress: 0,
              });
          }
          return cranes;
        };

        const generateRoomCode = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for(let i=0; i<5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        };

        // --- COMPOSANTS DE RENDU ---
        const BlockTile = ({ blockId, isSelected, status }) => {
          if (!blockId) return <div className="w-7 h-7 m-[1px]"></div>;
          const b = BLOCK_TYPES[blockId];
          let classes = "w-7 h-7 rounded-sm border-2 flex items-center justify-center font-black shadow-md m-[1px] relative transition-all duration-300 ";
          let textClass = (b.label === 'HAZ' || b.label === 'TW') ? 'text-[8px] tracking-tighter' : 'text-[11px]';

          if (isSelected) classes += " transform -translate-y-1 ring-2 ring-yellow-400 shadow-[0_5px_10px_rgba(250,204,21,0.5)] z-20";
          if (status === 'done') classes += " opacity-20 grayscale scale-95 border-dashed";
          if (status === 'current') classes += " ring-2 ring-yellow-400 ring-offset-1 ring-offset-slate-900 animate-pulse z-10 scale-110 shadow-lg";
          if (status === 'upcoming') classes += " opacity-90";

          return (
            <div className={classes} style={b.style} title={b.name}>
              {status === 'done' ? <span className="text-white text-[10px]">✓</span> : <span className={textClass}>{b.label}</span>}
            </div>
          );
        };

        const MiniMap = ({ layoutData, progress, type, isActive, name }) => {
          const bgColor = type === 'bay' ? 'bg-slate-900 border-slate-700' : 'bg-blue-900/40 border-blue-800/50';
          const opacity = isActive ? 'opacity-100' : 'opacity-40';
          return (
            <div className={`p-1.5 rounded flex flex-col items-center border ${bgColor} ${opacity} transition-all duration-500 w-full`}>
              <div className={`text-[9px] mb-1 uppercase tracking-widest font-bold ${type === 'bay' ? 'text-slate-500' : 'text-blue-400'}`}>
                {name}
              </div>
              {layoutData.enriched.map((row, rIdx) => (
                <div key={rIdx} className="flex justify-center">
                  {row.map((cell, cIdx) => {
                    if (!cell) return <div key={cIdx} className="w-7 h-7 m-[1px] border border-dashed border-white/10 rounded-sm"></div>;
                    let status = 'upcoming';
                    if (isActive) status = cell.linearIndex < progress ? 'done' : (cell.linearIndex === progress ? 'current' : 'upcoming');
                    else if (type === 'bay' && !isActive) status = 'done';
                    return <BlockTile key={cIdx} blockId={cell.type} status={status} />;
                  })}
                </div>
              ))}
            </div>
          );
        };

        // --- APPLICATION PRINCIPALE ---
        function App() {
          const [G, setG] = useState(null); 
          const [user, setUser] = useState(null);
          const [isAuthLoading, setIsAuthLoading] = useState(true); 
          const [roomId, setRoomId] = useState(null);
          const [joinCodeInput, setJoinCodeInput] = useState('');
          const [mySeat, setMySeat] = useState(0); 
          const [selected, setSelected] = useState(null);
          const [localMsg, setLocalMsg] = useState("");
          const [showRules, setShowRules] = useState(false);
          const [showNewGameConfirm, setShowNewGameConfirm] = useState(false);
          const [showMenuConfirm, setShowMenuConfirm] = useState(false);

          const [isAIEnabled, setIsAIEnabled] = useState(false);
          const [aiDifficulty, setAiDifficulty] = useState('moyen');

          // Init Auth
          useEffect(() => {
            if (!auth) {
                setIsAuthLoading(false);
                return;
            }
            const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch(e) { 
                    console.error("Auth init failed:", e); 
                    setIsAuthLoading(false);
                }
            };
            initAuth();
            
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                setUser(currentUser);
                setIsAuthLoading(false); 
            });
            return () => unsubscribe();
          }, []);

          // Sync Room
          useEffect(() => {
              if (!user || !roomId || !db) return;
              
              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
              
              const unsubscribe = onSnapshot(docRef, (snap) => {
                  if (snap.exists()) {
                      const data = snap.data();
                      if (data.payload) {
                          setG(JSON.parse(data.payload));
                      } else {
                          setG(data); 
                      }
                  } else {
                      setLocalMsg("La salle a été fermée ou n'existe plus.");
                      setRoomId(null);
                  }
              }, (error) => {
                  console.error("Firebase Sync Error:", error);
                  setLocalMsg("Erreur de synchro : " + error.message);
              });
              
              return () => unsubscribe();
          }, [user, roomId]);

          const createRoom = async () => {
              if (isAuthLoading) {
                  setLocalMsg("Veuillez patienter, connexion en cours...");
                  return;
              }
              if (!db || !user) {
                  setLocalMsg("Connexion au serveur impossible. Mode Hors-Ligne activé.");
                  startLocalGame();
                  return;
              }
              
              const code = generateRoomCode();
              const initialState = createInitialState();
              initialState.message = "Salle créée. Partagez le code à votre adversaire...";
              
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code), { payload: JSON.stringify(initialState) });
                  setMySeat(0);
                  setRoomId(code);
                  setLocalMsg("");
              } catch (e) {
                  console.error(e);
                  setLocalMsg("Erreur création Firebase : Veuillez vérifier les règles Firestore dans l'étape 2 du guide."); 
              }
          };

          const joinExistingRoom = async () => {
              if (isAuthLoading) {
                  setLocalMsg("Veuillez patienter, connexion en cours...");
                  return;
              }
              if (!db || !user) return;
              
              const code = joinCodeInput.toUpperCase().trim();
              if (code.length !== 5) {
                  setLocalMsg("Le code doit faire 5 lettres/chiffres.");
                  return;
              }
              
              try {
                  const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                  const snap = await getDoc(docRef);
                  if (snap.exists()) {
                      setMySeat(1);
                      setRoomId(code);
                      setLocalMsg("");
                  } else {
                      setLocalMsg(`Erreur : Aucune salle trouvée avec le code ${code}.`);
                  }
              } catch (e) {
                  setLocalMsg("Erreur de connexion : " + e.message);
              }
          };

          const startLocalGame = () => {
              setRoomId(null);
              setG(createInitialState());
              setMySeat(0);
          };

          const createInitialState = () => ({
              cour: generateInitialCour(),
              cranes: getRandomCranes(),
              players: [{ id: 1, score: 0 }, { id: 2, score: 0 }],
              transtainer: 4,
              stackers: [null, null],
              currentPlayer: 0,
              ap: 4,
              gameStatus: 'playing',
              message: "Nouvelle partie. C'est à vous de commencer.",
              history: []
          });

          const returnToMenu = () => {
              setG(null);
              setRoomId(null);
              setMySeat(0);
              setLocalMsg("");
          };

          const handleRestartGame = async () => {
              if (!canInteract) return;
              const newState = createInitialState();
              newState.message = "La partie a été réinitialisée par " + (mySeat === 0 ? "Joueur 1 (Bleu)." : "Joueur 2 (Rouge).");
              
              if (roomId && db && user) {
                  try {
                      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { payload: JSON.stringify(newState) });
                  } catch(e) {
                      setLocalMsg("Erreur réinitialisation : " + e.message);
                  }
              } else {
                  setG(newState);
              }
              setSelected(null);
          };

          const mutateG = async (mutatorFn) => {
              if (!G) return;
              const newG = JSON.parse(JSON.stringify(G));
              
              const historySnapshot = JSON.parse(JSON.stringify(G));
              delete historySnapshot.history;
              newG.history = newG.history || [];
              newG.history.push(historySnapshot);
              if (newG.history.length > 5) newG.history.shift(); 

              mutatorFn(newG);
              
              setG(newG);
              if (roomId && db && user) {
                  try {
                      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { payload: JSON.stringify(newG) });
                  } catch(e) {
                      setLocalMsg("Erreur sauvegarde : " + e.message);
                  }
              }
          };

          const isMyTurn = G?.currentPlayer === mySeat;
          const canInteract = G?.gameStatus === 'playing' && (!roomId || isMyTurn);

          const getFirstAvailCol = (pile) => { for(let c=0; c<4; c++) if(pile[c].length > 0) return c; return -1; };
          const getFirstNonFullCol = (pile) => { for(let c=0; c<4; c++) if(pile[c].length < 3) return c; return -1; };

          const getCurrentRequirement = (crane) => {
            if (crane.phase === 'done') return null;
            const data = crane.phase === 'bay' ? crane.bayData : crane.deckData;
            for (let r = 0; r < data.enriched.length; r++) {
              for (let c = 0; c < data.enriched[r].length; c++) {
                const cell = data.enriched[r][c];
                if (cell && cell.linearIndex === crane.progress) return cell.type;
              }
            }
            return null;
          };

          // --- IA (Cachée dans le code public pour simplifier) ---
          const executeAITurn = () => {
            if (!G) return;
            let requirements = [];
            G.cranes.forEach((crane, idx) => { if (crane.phase !== 'done') requirements.push({ blockId: getCurrentRequirement(crane), craneIdx: idx }); });
            let candidates = [];
            for (let p = 0; p < 10; p++) {
                for (let c = 0; c < 4; c++) {
                    if (G.cour[p][c].length > 0) {
                        let topBlock = G.cour[p][c][G.cour[p][c].length - 1];
                        let matchingTarget = requirements.find(req => req.blockId === topBlock);
                        if (matchingTarget) {
                            if (getFirstAvailCol(G.cour[p]) === c) {
                                let isBlocked = Math.abs(p - G.transtainer) <= 1;
                                let moveCost = (G.stackers[1] === p) ? 0 : (G.stackers[1] === null ? 0 : 1);
                                if (!isBlocked && (moveCost + 1 <= G.ap)) candidates.push({ type: 'POSE', machine: 'S', pIdx: p, cIdx: c, moveCost: moveCost, target: matchingTarget });
                            }
                            let tMoveCost = Math.abs(G.transtainer - p);
                            if (tMoveCost + 1 <= G.ap) candidates.push({ type: 'POSE', machine: 'T', pIdx: p, cIdx: c, moveCost: tMoveCost, target: matchingTarget });
                        }
                    }
                }
            }
            if (candidates.length > 0) {
                if (aiDifficulty === 'facile') candidates.sort(() => 0.5 - Math.random());
                else if (aiDifficulty === 'difficile') candidates.sort((a, b) => { let aBump = (a.machine === 'S' && G.stackers[0] === a.pIdx) || (a.machine === 'T' && G.stackers[0] !== null && Math.abs(G.stackers[0] - a.pIdx) <= 1) ? 1 : 0; let bBump = (b.machine === 'S' && G.stackers[0] === b.pIdx) || (b.machine === 'T' && G.stackers[0] !== null && Math.abs(G.stackers[0] - b.pIdx) <= 1) ? 1 : 0; if (aBump !== bBump) return bBump - aBump; return a.moveCost - b.moveCost; });
                else candidates.sort((a, b) => a.moveCost - b.moveCost);
                applyAIPose(candidates[0]); return;
            }
            let shiftCandidates = [];
            for (let p = 0; p < 10; p++) {
                for (let c = 0; c < 4; c++) {
                    if (G.cour[p][c].length > 1) {
                        let buriedBlock = G.cour[p][c][G.cour[p][c].length - 2];
                        let matchingTarget = requirements.find(req => req.blockId === buriedBlock);
                        if (matchingTarget) {
                            if (getFirstAvailCol(G.cour[p]) === c && Math.abs(p - G.transtainer) > 1) {
                                let moveCost = (G.stackers[1] === p) ? 0 : (G.stackers[1] === null ? 0 : 1);
                                let adjPiles = [];
                                if (p > 0 && getFirstNonFullCol(G.cour[p-1]) !== -1) adjPiles.push(p-1);
                                if (p < 9 && getFirstNonFullCol(G.cour[p+1]) !== -1) adjPiles.push(p+1);
                                if (adjPiles.length > 0 && (moveCost + 1 <= G.ap)) shiftCandidates.push({ type: 'SHIFT', machine: 'S', pIdx: p, cIdx: c, targetPIdx: adjPiles[0], moveCost: moveCost });
                            }
                            let tMoveCost = Math.abs(G.transtainer - p);
                            let targetCIdx = -1;
                            for(let tc=0; tc<4; tc++) { if (tc !== c && G.cour[p][tc].length < 3) targetCIdx = tc; }
                            if (targetCIdx !== -1 && (tMoveCost + 1 <= G.ap)) shiftCandidates.push({ type: 'SHIFT', machine: 'T', pIdx: p, cIdx: c, targetCIdx: targetCIdx, moveCost: tMoveCost });
                        }
                    }
                }
            }
            if (shiftCandidates.length > 0) {
                if (aiDifficulty === 'facile' && Math.random() > 0.5) { applyAIShift(shiftCandidates[Math.floor(Math.random() * shiftCandidates.length)]); return; }
                else if (aiDifficulty !== 'facile') { shiftCandidates.sort((a, b) => a.moveCost - b.moveCost); applyAIShift(shiftCandidates[0]); return; }
            }
            if (aiDifficulty === 'difficile' && G.ap >= 1 && G.stackers[0] !== null) {
                let tMoveCost = Math.abs(G.transtainer - G.stackers[0]);
                if (tMoveCost > 0 && tMoveCost <= G.ap) { applyAITMoveOnly(G.stackers[0], tMoveCost); return; }
            }
            if (aiDifficulty !== 'facile' && G.ap >= 2 && G.stackers[1] !== null) applyAISpelo();
            else mutateG(draft => { draft.ap = 0; });
          };

          useEffect(() => {
              if (G && isAIEnabled && G.currentPlayer === 1 && G.gameStatus === 'playing') {
                  const timer = setTimeout(() => { if (G.ap > 0) executeAITurn(); else endTurn(); }, 1200);
                  return () => clearTimeout(timer);
              }
          }, [G, isAIEnabled, aiDifficulty]);

          const applyAIPose = (move) => {
              mutateG(draft => {
                  const blockId = draft.cour[move.pIdx][move.cIdx].pop();
                  let pointsEarned = BLOCK_TYPES[blockId].points;
                  const activeCrane = draft.cranes[move.target.craneIdx];
                  activeCrane.progress += 1;
                  let msg = "";
                  const currentTotal = activeCrane.phase === 'bay' ? activeCrane.bayData.total : activeCrane.deckData.total;
                  let isGameOver = false;
                  if (activeCrane.progress === currentTotal) {
                      if (activeCrane.phase === 'bay') { activeCrane.phase = 'deck'; activeCrane.progress = 0; pointsEarned += 5; msg = `🤖 L'IA a scellé la Baie ${move.target.craneIdx + 1} ! (+${pointsEarned} PF)`; } 
                      else { activeCrane.phase = 'done'; pointsEarned += 10; msg = `🤖 L'IA a terminé le Deck ${move.target.craneIdx + 1} ! (+${pointsEarned} PF)`; if (draft.cranes.filter(c => c.phase === 'done').length >= 2) isGameOver = true; }
                  } else { msg = `🤖 L'IA a posé un [${BLOCK_TYPES[blockId].name}]. (-${move.moveCost+1} PG)`; }
                  draft.players[1].score += pointsEarned;
                  if (move.machine === 'S') { draft.stackers[1] = move.pIdx; if (draft.stackers[0] === move.pIdx) { draft.stackers[0] = null; msg += " Vous êtes expulsé !"; } } 
                  else { draft.transtainer = move.pIdx; if (draft.stackers[0] !== null && Math.abs(draft.stackers[0] - move.pIdx) <= 1) { draft.stackers[0] = null; msg += " L'Aura T vous expulse !"; } if (draft.stackers[1] !== null && Math.abs(draft.stackers[1] - move.pIdx) <= 1) { draft.stackers[1] = null; } }
                  draft.ap -= (move.moveCost + 1); draft.message = msg;
                  if (isGameOver) { draft.gameStatus = 'gameover'; const winner = draft.players[0].score > draft.players[1].score ? "Vous avez gagné" : "L'IA gagne"; draft.message = `🚨 FIN DE PARTIE ! ${winner} !`; }
              });
          };

          const applyAIShift = (move) => {
              mutateG(draft => {
                  const blockId = draft.cour[move.pIdx][move.cIdx].pop();
                  let msg = "";
                  if (move.machine === 'S') { draft.stackers[1] = move.pIdx; if (draft.stackers[0] === move.pIdx) { draft.stackers[0] = null; } const targetCol = getFirstNonFullCol(draft.cour[move.targetPIdx]); draft.cour[move.targetPIdx][targetCol].push(blockId); msg = `🤖 L'IA a shifté un bloc de P${move.pIdx+1}.`; } 
                  else { draft.transtainer = move.pIdx; if (draft.stackers[0] !== null && Math.abs(draft.stackers[0] - move.pIdx) <= 1) { draft.stackers[0] = null; } if (draft.stackers[1] !== null && Math.abs(draft.stackers[1] - move.pIdx) <= 1) { draft.stackers[1] = null; } draft.cour[move.pIdx][move.targetCIdx].push(blockId); msg = `🤖 L'IA utilise le Transtainer pour creuser la P${move.pIdx+1}.`; }

                                    <div className="flex justify-between items-center mb-1 border-b border-slate-700/50 pb-1">
                                        <span className="text-[10px] text-slate-500 font-bold ml-1">PILE {pIdx + 1}</span>
                                        <div onClick={() => handleParkingClick(pIdx)} className={`w-full ml-4 h-4 bg-slate-800/50 border border-slate-700 rounded-sm flex items-center justify-center transition ${canInteract ? 'cursor-pointer' : ''} ${selected?.type==='machine' && selected.id==='T' ? 'bg-yellow-500/20 border-yellow-500 animate-pulse' : 'hover:bg-slate-700'}`}>{G.transtainer === pIdx && (<div onClick={(e) => { e.stopPropagation(); handleMachineSelect('T', 'T'); }} className={`transition-transform ${selected?.type==='machine' && selected.id==='T' ? 'scale-125' : 'hover:scale-110'}`}>{renderMachineToken('T')}</div>)}</div>
                                    </div>
                                    {isAura && <div className="absolute inset-0 bg-red-900/10 border border-red-500/30 rounded-lg pointer-events-none z-0"></div>}
                                    <div className="flex items-end gap-2 mt-1 relative z-10">
                                        <div className="absolute -left-1 bottom-0 text-[8px] text-slate-600 -rotate-90 origin-bottom-left uppercase tracking-widest">Avant</div>
                                        <div onClick={() => handleParkingClick(pIdx)} className={`w-8 h-12 flex flex-col justify-end items-center pb-1 rounded border-b-2 transition ${canInteract ? 'cursor-pointer' : ''} ${isAura ? 'border-red-800 bg-red-950/30' : 'border-slate-500 bg-slate-800 hover:bg-slate-700'}`}>{G.stackers[0] === pIdx && <div onClick={(e)=>{e.stopPropagation(); handleMachineSelect('S',0);}}>{renderMachineToken('S', 0)}</div>}{G.stackers[1] === pIdx && <div onClick={(e)=>{e.stopPropagation(); handleMachineSelect('S',1);}} className="mt-1">{renderMachineToken('S', 1)}</div>}{G.stackers[0] !== pIdx && G.stackers[1] !== pIdx && <span className="text-[8px] text-slate-500">PARK</span>}</div>
                                        <div className="flex gap-1">
                                            {pile.map((col, cIdx) => (
                                                <div key={cIdx} onClick={() => handleColClick(pIdx, cIdx)} className={`w-8 h-[92px] bg-slate-900/80 rounded flex flex-col-reverse justify-start items-center p-0.5 border-x border-t border-slate-700 transition ${canInteract ? 'cursor-pointer' : ''} ${selected?.type === 'block' && selected.pile === pIdx && selected.col === cIdx ? 'bg-yellow-400/10 border-yellow-400' : col.length >= 3 ? 'border-b-2 border-b-slate-950' : 'hover:bg-slate-800 border-b border-b-slate-700'}`}>
                                                    {col.map((blockId, bIdx) => (<BlockTile key={bIdx} blockId={blockId} isSelected={bIdx === col.length - 1 && selected?.type === 'block' && selected.pile === pIdx && selected.col === cIdx} status="normal" />))}
                                                    {selected?.type === 'block' && selected.machine === 'T' && selected.pile === pIdx && col.length < 3 && (<div className="w-full flex-grow border border-dashed border-white/20 rounded mt-0.5 flex items-center justify-center opacity-50"><span className="text-[8px]">SHIFT</span></div>)}
                                                </div>
                                            ))}
                                        </div>
                                        <div className="text-[8px] text-slate-600 uppercase tracking-widest self-center ml-1">Fond</div>
                                    </div>
                                </div>
                            );
                        })}
                     </div>
                   </div>
                   <div className="mt-3 flex flex-wrap justify-center gap-3 bg-slate-900 p-2 rounded-lg border border-slate-800 shadow-lg">
                     {Object.values(BLOCK_TYPES).map(b => (
                       <div key={b.id} className="flex items-center gap-1.5 bg-black/40 px-2 py-1 rounded border border-slate-700"><div className="w-5 h-5 rounded-sm border shadow-sm flex items-center justify-center text-[9px] font-black" style={b.style}>{b.label}</div><span className="text-[10px] font-bold text-slate-300">{b.name} <span className="text-yellow-500 font-normal">({b.points})</span></span></div>
                     ))}
                   </div>
                </div>
              </div>

              {/* MODALS */}
              {showRules && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-5xl w-full max-h-[85vh] overflow-y-auto p-6 lg:p-8 shadow-[0_0_50px_rgba(0,0,0,1)] relative text-sm text-slate-300">
                    <button onClick={() => setShowRules(false)} className="absolute top-4 right-4 bg-red-700 hover:bg-red-600 text-white font-bold py-1 px-3 rounded transition shadow-md">X FERMER</button>
                    <h2 className="text-2xl lg:text-3xl font-bold text-blue-400 mb-6 border-b border-slate-700 pb-3 uppercase tracking-widest font-sans">📖 Manuel du Superviseur Logistique</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      <div>
                        <h3 className="text-lg font-bold text-yellow-400 mb-2 border-b border-slate-800 pb-1">LE BUT DU JEU</h3>
                        <p className="mb-6">Cumulez un maximum de Points de Fret (PF) en chargeant les conteneurs sur les 3 Grues. La partie se termine quand 2 des 3 "Decks" (Plans supérieurs) sont scellés.</p>
                        <h3 className="text-lg font-bold text-yellow-400 mb-2 border-b border-slate-800 pb-1">LA MACHINERIE (4 PG/tour)</h3>
                        <ul className="list-none space-y-4 mb-4">
                          <li className="bg-black/30 p-3 rounded border border-slate-800"><strong className="text-blue-400 text-base">🔵 STACKER (S) :</strong> 1 PG pour bouger. Prend uniquement le bloc à l'avant. Shifte vers une pile adjacente.</li>
                          <li className="bg-black/30 p-3 rounded border border-slate-800"><strong className="text-yellow-500 text-base">🟡 TRANSTAINER (T) :</strong> 1 PG par pile traversée. Bloque les Stackers avec son aura. Peut prendre n'importe quel sommet. Shifte dans sa propre pile.</li>
                        </ul>
                      </div>
                      <div>
                        <h3 className="text-lg font-bold text-emerald-400 mb-2 border-b border-slate-800 pb-1">⚙️ COMMENT JOUER ?</h3>
                        <ol className="list-decimal pl-5 space-y-3 mb-6 bg-slate-800/50 p-4 rounded border border-slate-700">
                          <li>Sélectionnez votre Stacker ou le Transtainer.</li>
                          <li>Déplacez-vous en cliquant sur la barre (T) ou le parking (S).</li>
                          <li>Cliquez sur un bloc valide de la pile.</li>
                          <li>Cliquez sur la Grue à gauche pour le poser et gagner vos PF.</li>
                          <li>Ou cliquez sur une autre destination pour le Shifter (Dégager un bloc).</li>
                        </ol>
                        <h3 className="text-lg font-bold text-red-400 mb-2 border-b border-slate-800 pb-1">LA ZONE SPELO</h3>
                        <p>Si vous êtes écrasé par un adversaire ou l'Aura du Transtainer, vous êtes expulsé en Spelo. L'avantage : revenir sur le terrain au prochain tour coûte 0 PG !</p>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {showNewGameConfirm && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-md w-full p-6 shadow-[0_0_50px_rgba(0,0,0,1)] text-center text-slate-300">
                     <h2 className="text-2xl font-bold text-emerald-400 mb-4 uppercase tracking-widest font-sans">Nouvelle Partie</h2>
                     <p className="mb-6">Réinitialiser le plateau pour tous les joueurs ? L'état actuel sera perdu.</p>
                     <div className="flex justify-center gap-4">
                         <button onClick={() => setShowNewGameConfirm(false)} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded font-bold transition">ANNULER</button>
                         <button onClick={() => { handleRestartGame(); setShowNewGameConfirm(false); }} className="px-4 py-2 bg-emerald-700 hover:bg-emerald-600 text-white rounded font-bold transition shadow-lg">RÉINITIALISER</button>
                     </div>
                  </div>
                </div>
              )}

              {showMenuConfirm && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                  <div className="bg-slate-900 border-2 border-slate-700 rounded-xl max-w-md w-full p-6 shadow-[0_0_50px_rgba(0,0,0,1)] text-center text-slate-300">
                     <h2 className="text-2xl font-bold text-blue-400 mb-4 uppercase tracking-widest font-sans">Retour au Menu</h2>
                     <p className="mb-4">Quitter cette partie et retourner à l'accueil ?</p>
                     {roomId && (
                         <div className="bg-blue-900/30 border border-blue-500/50 p-3 rounded mb-6 shadow-inner">
                             <p className="text-sm text-blue-300 mb-1">Pour revenir dans cette salle, notez :</p>
                             <p className="text-3xl font-bold text-white tracking-widest">{roomId}</p>
                         </div>
                     )}
                     <div className="flex justify-center gap-4">
                         <button onClick={() => setShowMenuConfirm(false)} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded font-bold transition">ANNULER</button>
                         <button onClick={() => { returnToMenu(); setShowMenuConfirm(false); }} className="px-4 py-2 bg-blue-700 hover:bg-blue-600 text-white rounded font-bold transition shadow-lg">QUITTER</button>
                     </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        // --- DÉMARRAGE REACT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
